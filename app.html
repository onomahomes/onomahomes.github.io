        <span class="pill ${p.estado_sistema==='activo'?'pill-green':'pill-gray'}" style="font-size:12px">${p.estado_sistema||'activo'}</span>
        ${p.orientacion ? `<span class="pill pill-gray" style="font-size:12px">${p.orientacion}</span>` : ''}
        ${p.estado_inmueble ? `<span class="pill pill-gray" style="font-size:12px">${p.estado_inmueble}</span>` : ''}
      </div>
    </div>
  `, 'lg', _pisoDetailReturnTo
    ? `<button class="btn btn-secondary" onclick="openMatchReview('${_pisoDetailReturnTo}')">← Volver a matchings</button>`
    : '');
}

function cardCarNav(el, dir) {
  const total = parseInt(el.dataset.total) || 1;
  let idx = parseInt(el.dataset.idx) || 0;
  idx = (idx + dir + total) % total;
  el.dataset.idx = idx;
  const slides = el.querySelector('.card-car-slides');
  if (slides) slides.style.transform = `translateX(-${idx * 100}%)`;
  const cnt = el.querySelector('.card-car-count');
  if (cnt) cnt.textContent = `${idx+1}/${total}`;
}

function carouselNav(dir) {
  if (_carouselFotos.length < 2) return;
  const slides = document.getElementById('carousel-slides');
  const count = document.getElementById('carousel-count');
  _carouselIdx = (_carouselIdx + dir + _carouselFotos.length) % _carouselFotos.length;
  if (slides) slides.style.transform = `translateX(-${_carouselIdx * 100}%)`;
  if (count) count.textContent = `${_carouselIdx + 1} / ${_carouselFotos.length}`;
}

// ─── MATCHINGS (asesor) — FASE 3: Review Flow ───────
let _matchReviewData = { demandas: [], matchings: [], pisosMap: {}, matchByDem: {} };
let _matchApproved = {};  // { matchingId: true/false }

TAB_LOADERS.matchings = async function() {
  const pane = document.getElementById('tab-matchings');
  tabLoad(pane);
  try {
    let dq = sb.from('demandas').select('id,nombre,zona_preferida,presupuesto_max,habitaciones_min,metros_min,estado,estado_matching,tipo_origen,cliente,colaborador,created_time')
      .order('created_time', { ascending: false });
    if (currentUser.rol !== 'director') dq = dq.eq('asesor_id', currentUser.id);
    const { data: demandas, error: dErr } = await dq;
    if (dErr) throw dErr;

    const demIds = (demandas||[]).map(d => d.id);
    let matchings = [];
    if (demIds.length) {
      for (let i = 0; i < demIds.length; i += 20) {
        const chunk = demIds.slice(i, i + 20);
        const { data: mData } = await sb.from('matchings')
          .select('id,demanda,piso,score_matching,texto_recomendacion,estado,accion_cliente,fecha_accion,feedback_descarte_asesor,envio_id')
          .or(chunk.map(id => `demanda.cs.{"${id}"}`).join(','));
        if (mData) matchings.push(...mData);
      }
    }

    const pisoIds = [...new Set(matchings.map(m => {
      const pid = Array.isArray(m.piso) ? m.piso[0] : m.piso;
      return pid ? String(pid).replace(/[{}]/g,'') : null;
    }).filter(Boolean))];
    let pisosMap = {};
    if (pisoIds.length) {
      const { data: pd } = await sb.from('pisos').select('id,direccion,barrio,precio,fotos,metros,habitaciones,banos,urban_flip,descripcion_ia,ascensor,terraza,garaje,trastero,estado_inmueble,planos,video,documentos,encargo_venta').in('id', pisoIds);
      (pd||[]).forEach(p => { pisosMap[p.id] = p; });
    }

    // Build demanda lookup for relevance filtering
    const demLookup = {};
    (demandas||[]).forEach(d => { demLookup[d.id] = d; });

    // Group matchings by demanda — STRICT MAX 5 per demanda
    const matchByDemAll = {};
    matchings.forEach(m => {
      const did = Array.isArray(m.demanda) ? m.demanda[0] : m.demanda;
      const key = did ? String(did).replace(/[{}]/g,'') : '';
      if (!matchByDemAll[key]) matchByDemAll[key] = [];
      matchByDemAll[key].push(m);
    });

    // For each demanda: keep top 5 by score, filter irrelevant
    const matchByDem = {};
    for (const [demId, mList] of Object.entries(matchByDemAll)) {
      const dem = demLookup[demId] || {};
      // Filter irrelevant (price >2x or hab <50%) unless already user-acted
      const filtered = mList.filter(m => {
        if (m.estado === 'aprobado' || m.estado === 'descartado_asesor') return true;
        const pid = Array.isArray(m.piso) ? m.piso[0] : m.piso;
        const p = pisosMap[pid ? String(pid).replace(/[{}]/g,'') : ''] || {};
        if (dem.presupuesto_max && p.precio && p.precio > dem.presupuesto_max * 2) return false;
        if (dem.habitaciones_min && p.habitaciones && p.habitaciones < dem.habitaciones_min * 0.5) return false;
        return true;
      });
      // Sort by score descending — keep ALL pending (not just 5) so counter works
      const acted = filtered.filter(m => m.estado === 'aprobado' || m.estado === 'descartado_asesor');
      const pending = filtered.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor')
        .sort((a,b) => (b.score_matching||0)-(a.score_matching||0));
      matchByDem[demId] = [...acted, ...pending];
    }

    _matchReviewData = { demandas: demandas||[], matchings, pisosMap, matchByDem };
    _matchApproved = {};

    // Sync acciones pendientes with real matching state
    syncMatchingAcciones(demandas, matchByDem);

    const totalMatch = matchings.length;
    const pendReview = Object.values(matchByDem).filter(dMatches => dMatches.some(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor' && m.estado !== 'enviado')).length;
    const activas = (demandas||[]).filter(d => (d.estado_matching||d.estado||'').trim().toLowerCase() !== 'eliminada').length;

    pane.innerHTML = `<div id="matchings-header"></div><div id="matchings-list"></div>`;
    renderMatchingsList();
  } catch(e) { tabError(pane, e); }
};

function renderMatchingsList() {
  const el = document.getElementById('matchings-list');
  const hdr = document.getElementById('matchings-header');
  if (!el) return;
  const { demandas, matchings, matchByDem } = _matchReviewData;

  // Recalculate KPIs — 5 cards
  const pendReview = matchings.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor').length;
  const activas = demandas.filter(d => (d.estado_matching||d.estado||'').trim().toLowerCase() !== 'eliminada').length;
  const enviadasColab = matchings.filter(m => m.estado === 'aprobado' && m.envio_id).length;
  const enviadasCliente = matchings.filter(m => m.accion_cliente && m.accion_cliente !== 'pendiente').length;
  const completadas = demandas.filter(d => (d.estado_matching||'').trim().toLowerCase() === 'completada').length;
  if (hdr) hdr.innerHTML = `
    <div class="tab-toolbar"><div><h2>Matchings</h2><p>${activas} demandas activas</p></div></div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px">
      <div style="background:white;border-radius:10px;padding:14px;border:1.5px solid var(--color-gris);text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--font-ui);color:var(--accent)">${activas}</div><div style="font-size:11px;color:var(--text-muted)">Demandas activas</div></div>
      <div style="background:white;border-radius:10px;padding:14px;border:1.5px solid var(--color-gris);text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--font-ui);color:var(--danger)">${pendReview}</div><div style="font-size:11px;color:var(--text-muted)">Por revisar</div></div>
      <div style="background:white;border-radius:10px;padding:14px;border:1.5px solid var(--color-gris);text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--font-ui);color:var(--gold)">${enviadasColab}</div><div style="font-size:11px;color:var(--text-muted)">Enviadas a colab.</div></div>
      <div style="background:white;border-radius:10px;padding:14px;border:1.5px solid var(--color-gris);text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--font-ui);color:var(--color-cafe);">${enviadasCliente}</div><div style="font-size:11px;color:var(--text-muted)">Enviadas a cliente</div></div>
      <div style="background:white;border-radius:10px;padding:14px;border:1.5px solid var(--color-gris);text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--font-ui);color:var(--color-success)">${completadas}</div><div style="font-size:11px;color:var(--text-muted)">Completadas</div></div>
    </div>`;

  // Filter out eliminadas
  const activeDemandas = demandas.filter(d => (d.estado_matching||d.estado||'').trim().toLowerCase() !== 'eliminada');
  if (!activeDemandas.length) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">🤝</span><p>No hay demandas activas.</p></div>'; return; }

  // Separate demandas with matchings vs without
  const demandasConMatch = [];
  const demandasSinMatch = [];
  activeDemandas.forEach(d => {
    const allM = (matchByDem[d.id] || []);
    const pendCount = allM.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor').length;
    const approvedCount = allM.filter(m => m.estado === 'aprobado').length;
    if (pendCount === 0 && approvedCount === 0 && allM.length === 0) demandasSinMatch.push(d);
    else if (pendCount === 0 && approvedCount === 0) {} // all discarded, hide from matchings
    else demandasConMatch.push(d);
  });

  let html = demandasConMatch.map(d => {
    const allM = (matchByDem[d.id] || []).sort((a,b) => (b.score_matching||0)-(a.score_matching||0));
    const pendCount = allM.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor').length;
    const approvedCount = allM.filter(m => m.estado === 'aprobado').length;
    const statusColor = pendCount > 0 ? 'gold' : 'green';
    const statusText = pendCount > 0 ? `${Math.min(pendCount, 5)} por revisar` : `${approvedCount} aprobados`;

    return `<div style="background:white;border:1.5px solid var(--color-gris);border-radius:12px;margin-bottom:16px;overflow:hidden">
      <div style="padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="openMatchReview('${d.id}')">
        <div>
          <div style="font-weight:600;font-size:15px">${d.nombre||'Sin nombre'}</div>
          <div style="font-size:12px;color:var(--text-muted)">${d.zona_preferida||''} · ${eur(d.presupuesto_max)} · ${d.habitaciones_min||'—'} hab</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pill pill-${statusColor}" style="font-size:11px">${statusText}</span>
          <span class="badge">${Math.min(pendCount + approvedCount, 5)}</span>
          <button class="btn btn-secondary btn-sm" style="font-size:11px;padding:4px 8px" onclick="event.stopPropagation();eliminarDemanda('${d.id}','${(d.nombre||'').replace(/'/g,"\\'")}')" title="Eliminar demanda">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Show demandas sin matchings
  if (demandasSinMatch.length) {
    html += `<div style="margin-top:24px"><div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-muted)">📋 Demandas sin matchings — buscad pisos en estas zonas</div>`;
    html += demandasSinMatch.map(d => `<div style="background:white;border:1.5px dashed var(--color-gris);border-radius:12px;margin-bottom:10px;padding:16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:14px">${d.nombre||'Sin nombre'}</div>
        <div style="font-size:12px;color:var(--text-muted)">${d.zona_preferida||'—'} · ${eur(d.presupuesto_max)} · ${d.habitaciones_min||'—'} hab</div>
      </div>
      <span class="pill pill-gray" style="font-size:11px">Sin pisos disponibles</span>
    </div>`).join('');
    html += `</div>`;
  }

  el.innerHTML = html;
}

function openMatchReview(demandaId) {
  const { demandas, matchByDem, pisosMap } = _matchReviewData;
  const d = demandas.find(x => x.id === demandaId);
  if (!d) return;
  const allMatches = (matchByDem[demandaId]||[]).sort((a,b) => (b.score_matching||0)-(a.score_matching||0));
  const approved = allMatches.filter(m => m.estado === 'aprobado');
  const pending = allMatches.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor');
  const totalDisponibles = pending.length + approved.length;
  const slotsForPending = Math.max(0, 5 - approved.length);
  const dMatches = [...approved, ...pending.slice(0, slotsForPending)];
  // Descartar siempre habilitado — aviso cuando quedan pocos
  const canDiscard = true;

  // Counter HTML — total = all non-discarded in queue (≥70%)
  let counterColor = 'var(--text-muted)';
  let counterMsg = '';
  if (totalDisponibles <= 5 && pending.length > 0) { counterColor = 'var(--color-warning)'; counterMsg = ' — ⚠️ Al descartar, el colaborador recibirá menos de 5 opciones'; }
  else if (totalDisponibles <= 10 && totalDisponibles > 5) { counterColor = 'var(--color-warning)'; counterMsg = ' — ⚠️ Quedan pocos pisos para esta demanda'; }
  const counterHtml = `<div id="match-counter" style="font-size:12px;color:${counterColor};margin-bottom:12px;padding:8px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">Mostrando ${Math.min(dMatches.length,5)} de <strong>${totalDisponibles}</strong> disponibles en cola (≥70%)${counterMsg}</div>`;

  function scoreColor(s) { return s >= 80 ? '#C9A84C' : s >= 60 ? '#B8860B' : '#8B2020'; }
  function scoreRing(s) {
    const pct = (s/100)*251; const color = scoreColor(s);
    return `<svg width="56" height="56" viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#e5e3df" stroke-width="5"/><circle cx="30" cy="30" r="26" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${pct} 251" stroke-dashoffset="0" transform="rotate(-90 30 30)" stroke-linecap="round"/><text x="30" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="${color}">${s}</text></svg>`;
  }

  const cards = dMatches.map(m => {
    const pid = Array.isArray(m.piso) ? m.piso[0] : m.piso;
    const pisoId = pid ? String(pid).replace(/[{}]/g,'') : '';
    const p = pisosMap[pisoId] || {};
    let _fotosArr = p.fotos || [];
    if (typeof _fotosArr === 'string') { try { _fotosArr = JSON.parse(_fotosArr); } catch(e) { _fotosArr = []; } }
    if (!Array.isArray(_fotosArr)) _fotosArr = [];
    const _rawFoto = _fotosArr.length > 0 ? (typeof _fotosArr[0]==='object' ? (_fotosArr[0].url || _fotosArr[0].thumbnails?.large?.url || '') : String(_fotosArr[0]||'')) : '';
    const foto = (_rawFoto && _rawFoto.startsWith('http')) ? _rawFoto : null;
    const score = m.score_matching ? Math.round(m.score_matching) : 0;
    const isUF = p.urban_flip;
    const isApproved = m.estado === 'aprobado';
    const isDiscarded = m.estado === 'descartado_asesor';
    const statusHtml = isApproved ? '<span class="pill pill-green" style="font-size:11px">✅ Aprobado</span>'
      : isDiscarded ? '<span class="pill pill-gray" style="font-size:11px">❌ Descartado</span>'
      : '';

    return `<div style="background:var(--bg);border:${isUF?'2px solid var(--gold)':'1px solid var(--border)'};border-radius:12px;overflow:hidden;${isDiscarded?'opacity:0.5':''}">
      <div style="display:flex;gap:14px;padding:14px">
        <div style="flex-shrink:0">
          ${foto ? `<img src="${foto}" style="width:100px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer" onclick="openPisoDetail('${pisoId}','${demandaId}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="width:100px;height:80px;display:none;align-items:center;justify-content:center;background:#f3f2ef;border-radius:8px;font-size:32px">🏠</div>` : `<div style="width:100px;height:80px;display:flex;align-items:center;justify-content:center;background:#f3f2ef;border-radius:8px;font-size:32px">🏠</div>`}
          <div style="text-align:center;margin-top:6px">${scoreRing(score)}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:4px">
            <div>
              ${isUF ? '<span class="pill pill-gold" style="font-size:10px;margin-bottom:4px;display:inline-block">⭐ URBAN FLIP</span><br>' : ''}
              <span style="font-weight:700;font-size:14px;cursor:pointer" onclick="openPisoDetail('${pisoId}','${demandaId}')">${p.direccion||'—'}</span>
            </div>
            ${statusHtml}
          </div>
          <div style="font-size:12px;color:var(--text-muted)">${p.barrio||''} · ${eur(p.precio)}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
            ${p.habitaciones?`<span class="pill pill-gray" style="font-size:10px;padding:2px 6px">${p.habitaciones} hab</span>`:''}
            ${p.metros?`<span class="pill pill-gray" style="font-size:10px;padding:2px 6px">${p.metros} m²</span>`:''}
            ${p.ascensor?`<span class="pill pill-green" style="font-size:10px;padding:2px 6px">Ascensor</span>`:''}
            ${p.terraza?`<span class="pill pill-blue" style="font-size:10px;padding:2px 6px">Terraza</span>`:''}
            ${p.garaje?`<span class="pill pill-blue" style="font-size:10px;padding:2px 6px">Garaje</span>`:''}
          </div>

// Mark matching_revisar action as done when all matchings of a demanda are reviewed
async function checkMatchingReviewDone(demandaId) {
  const dMatches = _matchReviewData.matchByDem[demandaId] || [];
  const pending = dMatches.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor');
  if (pending.length === 0) {
    await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('referencia_id', demandaId).eq('tipo', 'matching_revisar');
    loadPendingCount();
  }
}

// Sync: for each demanda with pending matchings, ensure an accion exists
async function syncMatchingAcciones(demandas, matchByDem) {
  try {
    // Get existing matching_revisar acciones for this asesor
    const { data: existingAcciones } = await sb.from('acciones_pendientes')
      .select('id,referencia_id,estado')
      .eq('asesor_id', currentUser.id)
      .eq('tipo', 'matching_revisar');
    const accionMap = {};
    (existingAcciones||[]).forEach(a => { accionMap[a.referencia_id] = a; });

    const activeDemandas = demandas.filter(d => (d.estado_matching||d.estado||'').trim().toLowerCase() !== 'eliminada');
    let created = 0;

    for (const d of activeDemandas) {
      const dMatches = matchByDem[d.id] || [];
      const pendingCount = dMatches.filter(m => m.estado !== 'aprobado' && m.estado !== 'descartado_asesor').length;

      if (pendingCount > 0) {
        const existing = accionMap[d.id];
        if (!existing || existing.estado === 'completada') {
          // Create or re-create accion
          if (existing) await sb.from('acciones_pendientes').delete().eq('id', existing.id);
          await sb.from('acciones_pendientes').insert({
            asesor_id: currentUser.id,
            tipo: 'matching_revisar',
            titulo: 'Revisar matchings: ' + (d.nombre || 'Demanda'),
            descripcion: pendingCount + ' pisos por revisar',
            referencia_id: d.id,
            estado: 'pendiente',
            prioridad: 'normal'
          });
          created++;
        }
      } else {
        // All reviewed — complete the accion if exists
        const existing = accionMap[d.id];
        if (existing && existing.estado === 'pendiente') {
          await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('id', existing.id);
        }
      }
    }
    if (created > 0) loadPendingCount();
  } catch(e) { /* silent — don't break matchings tab */ }
}

// Alarmas inteligentes: demanda sin visitas 30d + envíos sin actividad
// Alarmas: cada 5 días (2 intentos), después de 10 días sin feedback → escalar a director
async function checkDemandaAlarmas() {
  try {
    const { data: demandas } = await sb.from('demandas').select('id,nombre,tipo_origen,colaborador,created_time,asesor_id').eq('asesor_id', currentUser.id).eq('estado', 'Activa ');
    if (!demandas || !demandas.length) return;

    // Get ALL alarma actions (pendiente + completada) to track history
    const { data: allAcc } = await sb.from('acciones_pendientes').select('id,referencia_id,tipo,estado,fecha_creacion,fecha_completada')
      .eq('asesor_id', currentUser.id).in('tipo', ['llamada_sin_visita','llamada_sin_actividad','escalado_director']);
    const accByDem = {};
    (allAcc||[]).forEach(a => { if (!accByDem[a.referencia_id]) accByDem[a.referencia_id] = []; accByDem[a.referencia_id].push(a); });

    const now = Date.now();
    let created = 0;

    for (const d of demandas) {
      const createdMs = d.created_time ? new Date(d.created_time).getTime() : now;
      const diasActiva = (now - createdMs) / (1000*60*60*24);
      if (diasActiva < 5) continue; // Skip new demandas

      const esColab = d.tipo_origen === 'colaborador';
      const contacto = esColab ? 'al colaborador' : 'al comprador directo';
      const demAcciones = accByDem[d.id] || [];

      // Count completed seguimientos for this demanda
      const completados = demAcciones.filter(a => a.estado === 'completada' && (a.tipo === 'llamada_sin_visita' || a.tipo === 'llamada_sin_actividad')).length;
      const pendientes = demAcciones.filter(a => a.estado === 'pendiente' && (a.tipo === 'llamada_sin_visita' || a.tipo === 'llamada_sin_actividad')).length;
      const yaEscalado = demAcciones.some(a => a.tipo === 'escalado_director');

      // Check if demanda has any activity (visitas or matching responses)
      const { count: visitasCount } = await sb.from('visitas').select('id', { count: 'exact', head: true }).or(`demanda.cs.{"${d.id}"},demanda_2.cs.{"${d.id}"}`);
      const hasActivity = (visitasCount||0) > 0;
      if (hasActivity) continue; // Demanda with visits = no alarm needed

      if (pendientes > 0) continue; // Already has pending alarm

      // Intento 1: a los 5 días
      if (diasActiva >= 5 && completados === 0) {
        await sb.from('acciones_pendientes').insert({
          asesor_id: currentUser.id, tipo: 'llamada_sin_visita',
          titulo: '📞 1er seguimiento — ' + (d.nombre||'Demanda'),
          descripcion: Math.round(diasActiva) + ' días sin actividad. Contactar ' + contacto + ' para verificar interés.',
          referencia_id: d.id, estado: 'pendiente', prioridad: 'normal'
        });
        created++;
      }
      // Intento 2: a los 10 días (5 días después del primero)
      else if (diasActiva >= 10 && completados === 1) {
        await sb.from('acciones_pendientes').insert({
          asesor_id: currentUser.id, tipo: 'llamada_sin_actividad',
          titulo: '📞 2do seguimiento (URGENTE) — ' + (d.nombre||'Demanda'),
          descripcion: Math.round(diasActiva) + ' días sin actividad. Segundo intento. Si no hay respuesta, se escalará a dirección.',
          referencia_id: d.id, estado: 'pendiente', prioridad: 'alta'
        });
        created++;
      }
      // Escalado a director: después de 10 días sin feedback del asesor
      else if (diasActiva >= 10 && completados >= 2 && !yaEscalado) {
        // Create action for director
        const { data: dirs } = await sb.from('asesores').select('id').eq('rol','director').limit(1);
        const dirId = dirs && dirs[0] ? dirs[0].id : 'admin';
        await sb.from('acciones_pendientes').insert({
          asesor_id: dirId, tipo: 'escalado_director',
          titulo: '🚨 Demanda sin actividad 10+ días — ' + (d.nombre||'Demanda'),
          descripcion: 'El asesor ha contactado 2 veces sin resultado. Demanda: ' + (d.zona_preferida||'') + ', ' + eur(d.presupuesto_max) + '. Requiere decisión de dirección.',
          referencia_id: d.id, estado: 'pendiente', prioridad: 'alta'
        });
        created++;
      }
    }
    if (created > 0) loadPendingCount();
  } catch(e) { /* silent */ }
}

async function discardMatch(matchId) {
  const reason = document.querySelector('input[name="discard-reason"]:checked')?.value || '';
  const notes = document.getElementById('discard-notes')?.value || '';
  if (!reason) { toast('Selecciona un motivo', 'error'); return; }
  const feedback = reason + (notes ? ': ' + notes : '');
  try {
    await sb.from('matchings').update({ estado: 'descartado_asesor', feedback_descarte_asesor: feedback }).eq('id', matchId);
    const m = _matchReviewData.matchings.find(x => x.id === matchId);
    if (m) { m.estado = 'descartado_asesor'; m.feedback_descarte_asesor = feedback; }
    // Try to send feedback to MOD36
    callN8n('analizar-feedback', { matching_id: matchId, tipo: 'descarte_asesor', feedback }).catch(() => {});
    toast('Piso descartado');
    const did = m ? (Array.isArray(m.demanda)?m.demanda[0]:m.demanda) : null;
    if (did) { checkMatchingReviewDone(String(did).replace(/[{}]/g,'')); openMatchReview(String(did).replace(/[{}]/g,'')); }
  } catch(e) { toast('Error: '+e.message,'error'); }
}

async function generateEnvio(demandaId) {
  const d = _matchReviewData.demandas.find(x => x.id === demandaId);
  if (!d) return;
  const approved = (_matchReviewData.matchByDem[demandaId]||[]).filter(m => m.estado === 'aprobado');
  if (!approved.length) { toast('Aprueba al menos 1 piso', 'error'); return; }

  const linkHash = Math.random().toString(36).substring(2,14);
  const isDirecto = d.tipo_origen === 'comprador_directo' || d.tipo_origen === 'directo';
  const linkUrl = GH_PAGES + '/matchings-cliente.html?h=' + linkHash;

  // Build piso details for the message
  const pisosDetails = approved.map(m => {
    const pid = Array.isArray(m.piso)?m.piso[0]:m.piso;
    const pisoId = pid?String(pid).replace(/[{}]/g,''):'';
    const p = _matchReviewData.pisosMap[pisoId]||{};
    return { dir: p.direccion||'—', barrio: p.barrio||'', precio: p.precio||0, hab: p.habitaciones||0, m2: p.metros||0, score: Math.round(m.score_matching||0) };
  });

  // Get collaborator info if applicable
  let colabEmail = '', colabNombre = '';
  if (!isDirecto && d.colaborador) {
    try {
      const colabId = Array.isArray(d.colaborador) ? d.colaborador[0] : d.colaborador;
      const cid = String(colabId).replace(/[{}]/g,'');
      const { data: cd } = await sb.from('colaboradores').select('nombre,apellido,email,empresa').eq('id', cid).limit(1);
      if (cd && cd[0]) { colabNombre = [cd[0].nombre, cd[0].apellido].filter(Boolean).join(' '); colabEmail = cd[0].email || ''; }
    } catch(e) {}
  }

  // Save envio
  try {
    const envioId = genId();
    await sb.from('matchings').update({ envio_id: envioId, estado: 'enviado' }).in('id', approved.map(m => m.id));
    await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('referencia_id', demandaId).eq('tipo', 'matching_revisar').eq('estado', 'pendiente');
    loadPendingCount();
  } catch(e) { console.warn('Envio save:', e); }

  // Generate IA-style personalized message
  const clienteNombre = d.nombre || 'tu cliente';
  const pisosList = pisosDetails.map((p,i) => '  ' + (i+1) + '. ' + p.dir + ' — ' + eur(p.precio) + ' · ' + p.hab + ' hab · ' + p.m2 + ' m² (' + p.barrio + ')').join('\n');

  const msgText = isDirecto
    ? 'Hola ' + clienteNombre + ',\n\nDesde ONOMA Homes hemos seleccionado ' + approved.length + ' pisos que encajan con lo que buscas:\n\n' + pisosList + '\n\nPuedes ver las fichas completas, fotos y detalles aquí:\n' + linkUrl + '\n\nSi alguno te interesa, dinos y organizamos una visita.\n\nUn saludo,\nEl equipo de ONOMA Homes'
    : 'Hola ' + (colabNombre || 'colaborador') + ',\n\nHemos preparado ' + approved.length + ' opciones para ' + clienteNombre + ' que creemos que encajan muy bien con su perfil (' + (d.zona_preferida||'') + ', ' + eur(d.presupuesto_max) + ', ' + (d.habitaciones_min||'') + '+ hab):\n\n' + pisosList + '\n\nRevisa las fichas completas aquí y envíalas a tu cliente:\n' + linkUrl + '\n\nSi necesitas que ajustemos algo o quieres ver más opciones, dinos.\n\nUn saludo,\nONOMA Homes';

  const destino = isDirecto ? 'comprador' : 'colaborador';
  const emailTo = isDirecto ? '' : colabEmail;
  const emailSubject = encodeURIComponent('ONOMA — Nuevos matchings para ' + clienteNombre);
  const emailBody = encodeURIComponent(document.getElementById('envio-msg')?.value || msgText);

  openModal('📧 Envío generado', `
    <p style="color:var(--text-muted);margin-bottom:12px">Se han aprobado <strong>${approved.length} pisos</strong> para enviar al ${destino}.</p>
    ${!isDirecto && colabNombre ? '<div style="font-size:13px;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">📧 Destinatario: <strong>' + colabNombre + '</strong> (' + colabEmail + ')</div>' : ''}
    <div style="background:#f9f8f6;border-radius:8px;padding:14px;margin-bottom:14px">
      <div class="form-section-title" style="margin-bottom:8px">Mensaje (editable)</div>
      <textarea id="envio-msg" rows="10" style="width:100%;font-family:inherit;font-size:13px;padding:10px;border:1px solid var(--border);border-radius:8px;resize:vertical">${msgText}</textarea>
    </div>
    <div class="form-section-title" style="margin-bottom:8px">Link de envío</div>
    <div class="link-box" style="margin-bottom:14px"><span class="link-text" style="word-break:break-all">${linkUrl}</span><button class="btn btn-secondary btn-sm" onclick="copyLink('${linkUrl}')">Copiar</button></div>
  `, 'lg', `
    <button class="btn btn-secondary" onclick="closeModal();loadedTabs.delete('matchings');TAB_LOADERS.matchings()">Cerrar</button>
    <button class="btn btn-secondary" onclick="copyLink(document.getElementById('envio-msg').value)">📋 Copiar mensaje</button>
    <button class="btn btn-primary" onclick="window.open('mailto:${emailTo}?subject=${emailSubject}&body='+encodeURIComponent(document.getElementById('envio-msg').value))">📧 Enviar por Email</button>
  `);
}

  btn.classList.add('active');
  _informeTipo = tipo;
  _informeItemId = null; _informeItemLabel = '';
  const inp = document.getElementById('inf-search-input');
  const dd = document.getElementById('inf-search-dropdown');
  const badge = document.getElementById('inf-selected-badge');
  if (inp) { inp.value = ''; inp.placeholder = _infPlaceholders[tipo] || 'Buscar...'; }
  if (dd) dd.style.display = 'none';
  if (badge) badge.innerHTML = '';
}

let _infAcT;
async function searchInformeItem(q) {
  clearTimeout(_infAcT);
  const dd = document.getElementById('inf-search-dropdown');
  if (!dd) return;
  if (!q || q.length < 1) { dd.style.display = 'none'; return; }
  _infAcT = setTimeout(async () => {
    let items = [];
    const nq = norm(q); // normalized without accents
    if (_informeTipo === 'pisos') {
      // Fetch more results and filter client-side for accent-insensitive matching
      const { data } = await sb.from('pisos').select('id,direccion,barrio').limit(200);
      items = (data||[]).filter(p => norm(p.direccion||'').includes(nq) || norm(p.barrio||'').includes(nq)).slice(0,8).map(p => ({ id: p.id, main: p.direccion||'—', sub: p.barrio||'' }));
    } else if (_informeTipo === 'asesor') {
      const { data } = await sb.from('asesores').select('id,nombre,email').limit(50);
      items = (data||[]).filter(a => norm(a.nombre||'').includes(nq) || norm(a.email||'').includes(nq)).slice(0,8).map(a => ({ id: a.id, main: a.nombre||'—', sub: a.email||'' }));
    } else if (_informeTipo === 'colaborador') {
      const { data } = await sb.from('colaboradores').select('id,nombre,empresa').limit(100);
      items = (data||[]).filter(c => norm(c.nombre||'').includes(nq) || norm(c.empresa||'').includes(nq)).slice(0,8).map(c => ({ id: c.id, main: [c.nombre,c.empresa].filter(Boolean).join(' · '), sub: '' }));
    } else if (_informeTipo === 'demanda') {
      const { data } = await sb.from('demandas').select('id,nombre,zona_preferida').limit(100);
      items = (data||[]).filter(d => norm(d.nombre||'').includes(nq) || norm(d.zona_preferida||'').includes(nq)).slice(0,8).map(d => ({ id: d.id, main: d.nombre||'—', sub: d.zona_preferida||'' }));
    }
    if (!items.length) {
      dd.innerHTML = '<div class="autocomplete-item" style="color:var(--text-muted);cursor:default">Sin resultados para "' + q + '"</div>';
    } else {
      dd.innerHTML = items.map(it => `<div class="autocomplete-item" onclick="selectInformeItem('${it.id}','${it.main.replace(/'/g,"&#39;")}',this)"><strong>${it.main}</strong>${it.sub?`<span>${it.sub}</span>`:''}</div>`).join('');
    }
    dd.style.display = 'block';
  }, 250);
}

function selectInformeItem(id, label, el) {
  _informeItemId = id; _informeItemLabel = label;
  const dd = document.getElementById('inf-search-dropdown');
  const inp = document.getElementById('inf-search-input');
  const badge = document.getElementById('inf-selected-badge');
  if (dd) dd.style.display = 'none';
  if (inp) inp.value = label;
  if (badge) badge.innerHTML = `<div class="colab-badge">✅ ${label}<button type="button" onclick="clearInformeItem()" title="Cambiar">×</button></div>`;
}

function clearInformeItem() {
  _informeItemId = null; _informeItemLabel = '';
  const inp = document.getElementById('inf-search-input');
  const badge = document.getElementById('inf-selected-badge');
  if (inp) { inp.value = ''; inp.focus(); }
  if (badge) badge.innerHTML = '';
}

async function generarInforme() {
  const result = document.getElementById('inf-result');
  if (!result) return;
  result.innerHTML = '<div class="tab-loading"><div class="spinner"></div></div>';
  const desde = document.getElementById('inf-desde')?.value || null;
  const hasta = document.getElementById('inf-hasta')?.value || null;

  try {
    // Build date filter helper
    function addDateFilter(q) {
      if (desde) q = q.gte('created_time', desde);
      if (hasta) q = q.lte('created_time', hasta + 'T23:59:59');
      return q;
    }

    if (_informeTipo === 'pisos' && _informeItemId) {
      // Informe de un piso específico
      const pisoId = _informeItemId;
      const [{ data: p }, visitasRes, matchingsRes] = await Promise.all([
        sb.from('pisos').select('*').eq('id', pisoId).limit(1),
        sb.from('visitas').select('id,estado,fecha_hora,cliente_nombre,colaborador_id,valoracion_asesor,decision_cliente,notas_feedback').eq('piso_id', pisoId),
        sb.from('matchings').select('id,estado,created_time').filter('piso', 'cs', `{"${pisoId}"}`),
      ]);
      const piso = p?.[0] || {};
      const visitas = visitasRes.data || [];
      const matchings = matchingsRes.data || [];

      const vConfirmadas = visitas.filter(v => v.estado === 'confirmada' || v.estado === 'realizada').length;
      const vCompletadas = visitas.filter(v => v.estado === 'realizada').length;
      const feedbacks = visitas.filter(v => v.notas_feedback);
      const decisiones = {};
      visitas.forEach(v => { if (v.decision_cliente) decisiones[v.decision_cliente] = (decisiones[v.decision_cliente]||0)+1; });

      result.innerHTML = `
        <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">🏘️ ${piso.direccion||'Piso'}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">${piso.barrio||''} · ${eur(piso.precio)}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
            ${[['Matchings',matchings.length,'pill-blue'],['Visitas solicitadas',visitas.length,'pill-gray'],['Visitas realizadas',vCompletadas,'pill-green'],['Feedbacks',feedbacks.length,'pill-gold']].map(([l,n,c])=>`<div style="text-align:center;padding:14px;background:#f9f8f6;border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--accent)">${n}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">${l}</div></div>`).join('')}
          </div>
          ${Object.keys(decisiones).length ? `<div style="margin-bottom:16px"><div class="form-section-title">Decisiones del cliente</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${Object.entries(decisiones).map(([d,n])=>`<span class="pill pill-gray">${d}: <strong>${n}</strong></span>`).join('')}</div></div>` : ''}
          ${visitas.length ? `<div><div class="form-section-title">Historial de visitas (${visitas.length})</div>
          <div class="data-table" style="margin-top:8px"><table><thead><tr><th>Cliente</th><th>Fecha</th><th>Estado</th><th>Valoración</th><th>Decisión</th></tr></thead>
          <tbody>${visitas.map(v=>`<tr>
            <td style="font-weight:600">${v.cliente_nombre||'—'}</td>
            <td style="font-size:13px;color:var(--text-muted)">${fdate(v.fecha_hora)}</td>
            <td><span class="pill ${v.estado==='realizada'?'pill-green':v.estado==='confirmada'?'pill-blue':'pill-gray'}" style="font-size:11px">${v.estado||'—'}</span></td>
            <td style="text-align:center">${v.valoracion_asesor ? '⭐'.repeat(v.valoracion_asesor) : '—'}</td>
            <td style="font-size:13px">${v.decision_cliente||'—'}</td>
          </tr>`).join('')}</tbody></table></div></div>` : ''}
        </div>`;

    } else if (_informeTipo === 'asesor' && _informeItemId) {
      const asesId = _informeItemId;
      const [pisosRes, demandasRes, visitasRes, matchRes] = await Promise.all([
        sb.from('pisos').select('id,direccion,precio,estado_sistema',{count:'exact'}).filter('asesor_piso','cs',`{"${asesId}"}`),
        sb.from('demandas').select('id',{count:'exact',head:true}).eq('asesor_id', asesId),
        sb.from('visitas').select('id,estado,decision_cliente',{count:'exact'}).eq('asesor_id', asesId),
        sb.from('matchings').select('id',{count:'exact',head:true}).eq('asesor_id', asesId),
      ]);
      const visitas = visitasRes.data || [];
      const realizadas = visitas.filter(v => v.estado === 'realizada');
      const ofertas = visitas.filter(v => v.decision_cliente === 'Hará oferta');
      result.innerHTML = `
        <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:20px">👔 KPIs: ${_informeItemLabel}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
            ${[['Pisos',pisosRes.count||0],['Demandas',demandasRes.count||0],['Visitas',visitasRes.count||0],['Matchings',matchRes.count||0]].map(([l,n])=>`<div style="text-align:center;padding:14px;background:#f9f8f6;border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--accent)">${n}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">${l}</div></div>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
            <div style="text-align:center;padding:14px;background:#f0fdf4;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#22c55e">${realizadas.length}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Visitas realizadas</div></div>
            <div style="text-align:center;padding:14px;background:#fef3c7;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#d97706">${ofertas.length}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Ofertas generadas</div></div>
          </div>
        </div>`;

    } else if (_informeTipo === 'colaborador' && _informeItemId) {
      const colId = _informeItemId;
      const [pR, dR, vR] = await Promise.all([
        sb.from('pisos').select('id',{count:'exact',head:true}).filter('colaborador','cs',`{"${colId}"}`),
        sb.from('demandas').select('id',{count:'exact',head:true}).filter('colaborador','cs',`{"${colId}"}`),
        sb.from('visitas').select('id,estado,decision_cliente',{count:'exact'}).eq('colaborador_id', colId),
      ]);
      const visitas = vR.data || [];
      const realizadas = visitas.filter(v => v.estado === 'realizada');
      result.innerHTML = `
        <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:20px">🤝 KPIs: ${_informeItemLabel}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
            ${[['Pisos aportados',pR.count||0],['Demandas aportadas',dR.count||0],['Visitas generadas',vR.count||0]].map(([l,n])=>`<div style="text-align:center;padding:14px;background:#f9f8f6;border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--accent)">${n}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">${l}</div></div>`).join('')}
          </div>
          <div style="text-align:center;padding:14px;background:#f0fdf4;border-radius:8px;margin-top:12px"><div style="font-size:24px;font-weight:700;color:#22c55e">${realizadas.length}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Visitas realizadas</div></div>
        </div>`;

    } else if (_informeTipo !== 'todo' && !_informeItemId) {
      result.innerHTML = `<div class="alert alert-warning">⚠️ Selecciona un elemento específico del buscador para generar el informe.</div>`;
    } else {
      // Informe global
      const [pisosR, demandasR, visitasR, matchR, colabsR] = await Promise.all([
        addDateFilter(sb.from('pisos').select('id',{count:'exact',head:true})),
        addDateFilter(sb.from('demandas').select('id',{count:'exact',head:true})),
        addDateFilter(sb.from('visitas').select('id,estado,decision_cliente',{count:'exact'})),
        addDateFilter(sb.from('matchings').select('id',{count:'exact',head:true})),
        sb.from('colaboradores').select('id',{count:'exact',head:true}).eq('contrato_estado','firmado'),
      ]);
      const visitas = visitasR.data || [];
      const realizadas = visitas.filter(v => v.estado === 'realizada');
      const ofertas = visitas.filter(v => v.decision_cliente === 'Hará oferta');
      result.innerHTML = `
        <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">🌐 Informe Global ONOMA</div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">${desde||'Inicio'} → ${hasta||'Hoy'}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px">
            ${[['Pisos en cartera',pisosR.count||0],['Demandas activas',demandasR.count||0],['Matchings enviados',matchR.count||0]].map(([l,n])=>`<div style="text-align:center;padding:14px;background:#f9f8f6;border-radius:8px"><div style="font-size:24px;font-weight:700;color:var(--accent)">${n}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">${l}</div></div>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
            ${[['Visitas',visitasR.count||0,'#f9f8f6','var(--accent)'],['Realizadas',realizadas.length,'#f0fdf4','#22c55e'],['Ofertas',ofertas.length,'#fef3c7','#d97706'],['Colabs firmados',colabsR.count||0,'#f0f4ee','var(--accent)']].map(([l,n,bg,col])=>`<div style="text-align:center;padding:14px;background:${bg};border-radius:8px"><div style="font-size:24px;font-weight:700;color:${col}">${n}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">${l}</div></div>`).join('')}
          </div>
        </div>`;
    }
  } catch(e) { result.innerHTML = `<div class="tab-error">Error generando informe: ${e.message}</div>`; }
}

// VISITAS
function countdown(dt) {
  const d = new Date(dt);
  const now = new Date();
  const diff = d - now;
  const days = Math.floor(diff / 86400000);
  if (days < 0) return '<span style="color:var(--text-muted)">Pasada</span>';
  if (days === 0) return `<span style="color:#22c55e;font-weight:600">Hoy a las ${d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</span>`;
  if (days === 1) return '<span style="color:#f59e0b;font-weight:600">Mañana</span>';
  return `<span>En ${days} días</span>`;
}

function filterVisitasSection(btn, filter) {
  btn.closest('.filters-bar').querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.visitas-section').forEach(s => {
    s.style.display = filter === 'all' || s.dataset.section === filter ? '' : 'none';
  });
}

async function confirmarVisita(id) {
  try {
    await sb.from('visitas').update({ estado: 'confirmada' }).eq('id', id);
    // Mark related accion as done
    await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('referencia_id', id).eq('tipo', 'visita_confirmar');
    loadPendingCount();
    toast('✅ Visita confirmada');
    loadedTabs.delete('visitas'); TAB_LOADERS.visitas();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function rechazarVisita(id) {
  try {
    await sb.from('visitas').update({ estado: 'cancelada' }).eq('id', id);
    await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('referencia_id', id).eq('tipo', 'visita_confirmar');
    loadPendingCount();
    toast('Visita rechazada');
    loadedTabs.delete('visitas'); TAB_LOADERS.visitas();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function openFeedbackModal(visitaId) {
  // Load visita context automatically
  let visita = {}, pisoInfo = {};
  try {
    const { data: vd } = await sb.from('visitas').select('*').eq('id', visitaId).limit(1);
    if (vd && vd[0]) visita = vd[0];
    if (visita.piso_id) {
      const { data: pd } = await sb.from('pisos').select('id,direccion,barrio,precio,fotos').eq('id', visita.piso_id).limit(1);
      if (pd && pd[0]) pisoInfo = pd[0];
    }
  } catch(e) {}

  const pisoDir = pisoInfo.direccion || '—';
  const pisoBarrio = pisoInfo.barrio || '';
  const dt = visita.fecha_hora ? new Date(visita.fecha_hora).toLocaleString('es-ES',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const contextHtml = `<div style="background:var(--bg);border:1.5px solid var(--color-gris);border-radius:10px;padding:16px;margin-bottom:20px">

async function uploadFeedbackMedia(input) {
  const file = input.files[0]; if (!file) return;
  const status = document.getElementById('feedback-media-status');
  status.textContent = 'Subiendo...';
  try {
    const r = await uploadToCloudinary(file, 'onoma/feedback');
    document.getElementById('feedback-media-url').value = r.secure_url;
    status.textContent = '✅ ' + file.name; status.style.color = '#2C5F2E';
  } catch(e) { status.textContent = '❌ Error'; toast('Error: ' + e.message, 'error'); }
}

async function submitFeedback(visitaId) {
  const form = document.getElementById('feedback-form');
  const fd = new FormData(form);
  const paso = fd.get('proximo_paso');
  if (!paso) { toast('Selecciona un próximo paso (Descartar/Guardar/Segunda visita/Reservar)','error'); return; }
  const btn = document.querySelector('.modal-footer .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  try {
    const feedback = {
      comprador_gusto: fd.get('comprador_gusto')||null,
      comprador_no_gusto: fd.get('comprador_no_gusto')||null,
      comprador_descarta: fd.get('comprador_descarta')||null,
      vendedor_observaciones: fd.get('vendedor_observaciones')||null,
      broker_profesionalidad: fd.get('broker_profesionalidad')||null,
      broker_observaciones: fd.get('broker_observaciones')||null,
      piso_positivos: fd.get('piso_positivos')||null,
      piso_negativos: fd.get('piso_negativos')||null,
      media_url: fd.get('media_url')||null,
      proximo_paso: paso,
    };

    await sb.from('visitas').update({
      feedback_asesor_completado: true,
      valoracion_asesor: parseInt(fd.get('broker_profesionalidad'))||null,
      decision_cliente: paso,
      notas_feedback: JSON.stringify(feedback),
    }).eq('id', visitaId);

    // Mark related accion as done
    await sb.from('acciones_pendientes').update({ estado: 'completada' }).eq('referencia_id', visitaId).eq('tipo', 'feedback_visita');
    loadPendingCount();

    const esColab = fd.get('es_colaborador') === '1';
    const linkHash = btoa(visitaId + ':' + Date.now()).replace(/=/g,'');

    toast('✅ Feedback guardado');
    closeModal();

    // Generate link for next in chain
    if (esColab) {
      const colabLink = GH_PAGES + '/feedback-colab.html?h=' + linkHash;
      openModal('📧 Enviar al colaborador', `
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Envía este enlace al colaborador para que complete su parte del feedback:</p>
        <div class="link-box"><span class="link-text">${colabLink}</span><button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('${colabLink}');toast('Link copiado')">📋</button></div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-primary" onclick="window.open('https://wa.me/?text='+encodeURIComponent('Hola, completa tu feedback de la visita aquí:\\n${colabLink}'))">💬 WhatsApp</button>
          <button class="btn btn-secondary" onclick="window.open('mailto:?subject='+encodeURIComponent('Feedback de visita — ONOMA')+'&body='+encodeURIComponent('Completa tu feedback:\\n\\n${colabLink}'))">📧 Email</button>
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:14px">Las páginas externas de feedback (colaborador y comprador final) se construyen en Fase 6.</p>
      `, 'sm', '<button class="btn btn-secondary" onclick="closeModal();loadedTabs.delete(\'visitas\');TAB_LOADERS.visitas()">Cerrar</button>');
    } else {
      const clienteLink = GH_PAGES + '/feedback-cliente.html?h=' + linkHash;
      openModal('📧 Enviar al comprador', `
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Envía este enlace al comprador para que valore el piso:</p>
        <div class="link-box"><span class="link-text">${clienteLink}</span><button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('${clienteLink}');toast('Link copiado')">📋</button></div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-primary" onclick="window.open('https://wa.me/?text='+encodeURIComponent('Hola, nos gustaría tu opinión sobre el piso:\\n${clienteLink}'))">💬 WhatsApp</button>
          <button class="btn btn-secondary" onclick="window.open('mailto:?subject='+encodeURIComponent('¿Qué te pareció el piso? — ONOMA')+'&body='+encodeURIComponent('Completa este breve formulario:\\n\\n${clienteLink}'))">📧 Email</button>
        </div>
        <div style="margin-top:14px;padding:12px;background:var(--color-gold-bg);border-radius:8px;font-size:12px;color:var(--color-gold-dark)">
          El comprador podrá: 🗑️ Descartar · 💾 Guardar · 🔄 Segunda visita · ✅ Reservar
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:10px">La página externa de feedback del comprador se construye en Fase 6.</p>
      `, 'sm', '<button class="btn btn-secondary" onclick="closeModal();loadedTabs.delete(\'visitas\');TAB_LOADERS.visitas()">Cerrar</button>');
    }
  } catch(e) { toast('Error: ' + e.message, 'error'); if(btn) { btn.disabled=false; btn.textContent='Guardar feedback'; } }

TAB_LOADERS.visitas = async function() {
  const pane = document.getElementById('tab-visitas');
  tabLoad(pane);
  try {
    const { data, error } = await sb.from('visitas')
      .select('id,fecha_hora,estado,cliente_nombre,colaborador_id,piso_id,feedback_asesor_completado,valoracion_asesor,decision_cliente')
      .eq('asesor_id', currentUser.id)
      .order('fecha_hora', { ascending: true });
    if (error) throw error;

    // Fetch piso data for display
    const pisoIds = [...new Set((data||[]).map(v => v.piso_id).filter(Boolean))];
    const pisosMap = {};
    if (pisoIds.length > 0) {
      const { data: pd } = await sb.from('pisos').select('id,direccion,barrio,fotos').in('id', pisoIds);
      (pd||[]).forEach(p => { pisosMap[p.id] = p; });
    }

    const sections = {
      solicitada:        (data||[]).filter(v => v.estado === 'solicitada'),
      confirmada:        (data||[]).filter(v => v.estado === 'confirmada'),
      pendiente_feedback:(data||[]).filter(v => v.estado === 'realizada' && !v.feedback_asesor_completado),
      completada:        (data||[]).filter(v => v.estado === 'realizada' && v.feedback_asesor_completado),
    };

    function pisoCard(v, tipo) {
      const p = pisosMap[v.piso_id];
      let _vFotos = p ? (p.fotos || []) : [];
      if (typeof _vFotos === 'string') { try { _vFotos = JSON.parse(_vFotos); } catch(e) { _vFotos = []; } }
      if (!Array.isArray(_vFotos)) _vFotos = [];
      const foto = _vFotos.length > 0 ? (typeof _vFotos[0]==='object' ? (_vFotos[0].thumbnail||_vFotos[0].url||'') : String(_vFotos[0]||'')) : null;
      const pinfo = p ? `${p.direccion||'—'} · ${p.barrio||''}` : 'Piso no encontrado';
      const dt = v.fecha_hora ? new Date(v.fecha_hora).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
      const imgHtml = foto ? `<img src="${foto}" style="width:76px;height:62px;border-radius:6px;object-fit:cover;flex-shrink:0">` : `<div style="width:76px;height:62px;border-radius:6px;background:#f3f2ef;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏠</div>`;

      if (tipo === 'solicitada') return `<div class="visita-card" data-visita-id="${v.id}" style="grid-template-columns:76px 1fr auto;border-left:3px solid #f59e0b">
        ${imgHtml}
        <div><div style="font-weight:600;font-size:14px">${pinfo}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">👤 ${v.cliente_nombre||'—'} · 🤝 ${v.colaborador_id||'Directo'}</div>
          <div style="font-size:12px;margin-top:3px">📅 ${dt}</div></div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="confirmarVisita('${v.id}')">✅ Confirmar</button>
          <button class="btn btn-secondary btn-sm" onclick="rechazarVisita('${v.id}')">❌ Rechazar</button>
        </div></div>`;

      if (tipo === 'confirmada') return `<div class="visita-card" style="grid-template-columns:76px 1fr auto;border-left:3px solid #22c55e">
        ${imgHtml}
        <div><div style="font-weight:600;font-size:14px">${pinfo}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">👤 ${v.cliente_nombre||'—'} · 🤝 ${v.colaborador_id||'Directo'}</div>
          <div style="font-size:12px;margin-top:3px">📅 ${dt}</div></div>
        <div style="text-align:right;font-size:13px">${v.fecha_hora ? countdown(v.fecha_hora) : '—'}</div>
      </div>`;

      if (tipo === 'pendiente_feedback') return `<div class="visita-card" style="grid-template-columns:76px 1fr auto;border-left:3px solid var(--danger);cursor:pointer" onclick="openFeedbackModal('${v.id}')">
        ${imgHtml}
        <div><div style="font-weight:600;font-size:14px">${pinfo}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">👤 ${v.cliente_nombre||'—'}</div>
          <div style="font-size:12px;margin-top:3px">📅 ${dt}</div></div>
        <span class="pill pill-red" style="align-self:start">Pendiente</span>
      </div>`;

      return `<div class="visita-card" style="background:#f9f8f6">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-weight:600;font-size:14px">${pinfo}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:3px">📅 ${dt}</div></div>
          <div style="text-align:right;font-size:13px">${v.valoracion_asesor ? `⭐ ${v.valoracion_asesor}/5` : ''}<br><span style="color:var(--text-muted)">${v.decision_cliente||''}</span></div>
        </div>
      </div>`;
    }

    function renderSection(title, items, tipo, color, icon) {
      return `<div class="visitas-section" data-section="${tipo}">
        <div class="visitas-section-header" style="color:${color}">${icon} ${title} <span style="font-weight:400;font-size:13px;color:var(--text-muted)">(${items.length})</span></div>
        ${items.length === 0 ? `<p style="color:var(--text-muted);font-size:13px;padding:4px 0">Sin visitas en este estado.</p>`
          : `<div style="display:flex;flex-direction:column;gap:10px">${items.map(v => pisoCard(v, tipo)).join('')}</div>`}
      </div>`;
    }

    pane.innerHTML = `
      <div class="tab-toolbar">
        <div><h2>📍 Visitas</h2></div>
      </div>
      <div class="filters-bar">
        <button class="filter-chip active" onclick="filterVisitasSection(this,'all')">Todas</button>
        <button class="filter-chip" onclick="filterVisitasSection(this,'solicitada')">Por confirmar (${sections.solicitada.length})</button>
        <button class="filter-chip" onclick="filterVisitasSection(this,'confirmada')">Confirmadas (${sections.confirmada.length})</button>
        <button class="filter-chip" onclick="filterVisitasSection(this,'pendiente_feedback')">Feedback pendiente (${sections.pendiente_feedback.length})</button>
        <button class="filter-chip" onclick="filterVisitasSection(this,'completada')">Completadas (${sections.completada.length})</button>
      </div>
      ${!(data&&data.length) ? `<div class="empty-state"><span class="empty-icon">📍</span><p>Aún no hay visitas registradas.</p></div>` : `
      ${renderSection('Por confirmar', sections.solicitada, 'solicitada', '#f59e0b', '🕐')}
      ${renderSection('Confirmadas / Próximas', sections.confirmada, 'confirmada', '#22c55e', '✅')}
      ${renderSection('Pendientes de feedback', sections.pendiente_feedback, 'pendiente_feedback', 'var(--danger)', '⚠️')}
      ${renderSection('Completadas', sections.completada, 'completada', 'var(--text-muted)', '✓')}`}`;
  } catch(e) { tabError(pane, e); }
};

async function uploadLogo(input) {

    preview.innerHTML = `<img src="${r.secure_url}" alt="Logo">`;
    toast('Logo subido');

}

async function submitColaborador() {
  const form = document.getElementById('colab-form');
  if (vScrollFirst('colab-form')) return;
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const btn = document.getElementById('btn-save-colab');
  btn.disabled = true; btn.textContent = 'Guardando…';
  try {
    const fd = new FormData(form);
    const newId = genId();
    const esIndep = fd.get('es_independiente') === 'true';
    const record = {
      id: newId, nombre: fd.get('nombre'), apellido: fd.get('apellido')||null,
      empresa: fd.get('empresa')||null, cif_empresa: fd.get('cif_empresa')||null,
      email: fd.get('email'), telefono: fd.get('telefono')||null, nif_cif: fd.get('nif_cif'),
      cargo: fd.get('cargo')||null, logo_empresa: fd.get('logo_empresa')||null,
      brand_color: fd.get('brand_color')||'#A6896E', landing_web: fd.get('landing_web')||null,
      es_independiente: esIndep, asesor_onoma: [currentUser.id],
      estado: 'pendiente_activacion', contrato_estado: 'pendiente',
      acepta_broker_broker: !!fd.get('acuerdo_inter'),
      acepta_urban_flip: !!fd.get('acuerdo_uf'),
      acepta_tripartita: !!fd.get('acuerdo_trip'),
      direccion_fiscal: fd.get('direccion_fiscal')||null,
    };
    const { error } = await sb.from('colaboradores').insert(record);
    if (error) {
      if (error.code === '23505' || (error.message||'').includes('duplicate')) {
        if ((error.message||'').includes('email')) throw new Error('Este correo electrónico ya está registrado en el sistema.');
        else if ((error.message||'').includes('nif_cif')) throw new Error('Este NIF/CIF ya está registrado en el sistema.');
        else throw new Error('Ya existe un colaborador con estos datos. Revisa el email y el NIF/CIF.');
      }
      throw error;
    }
    toast('✅ Colaborador guardado');
    loadedTabs.delete('colaboradores');
    generateAndShowContrato(record, { inter: !!fd.get('acuerdo_inter'), uf: !!fd.get('acuerdo_uf'), trip: !!fd.get('acuerdo_trip') });
  } catch(e) { toast('Error: ' + e.message, 'error'); btn.disabled = false; btn.textContent = 'Guardar y Generar Contrato'; }

function _barrioAutocomplete(inputId, containerId) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  inp.addEventListener('input', function() {
    const q = norm(this.value).toLowerCase();
    const container = document.getElementById(containerId);
    if (!q || q.length < 2) { container.innerHTML = ''; return; }
    const matches = BARRIOS_MADRID.filter(b => norm(b).toLowerCase().includes(q));
    matches.sort((a,b) => { const an=norm(a).toLowerCase(),bn=norm(b).toLowerCase(); const as=an.startsWith(q),bs=bn.startsWith(q); if(as&&!bs)return -1; if(!as&&bs)return 1; return a.localeCompare(b); });
    container.innerHTML = matches.slice(0,8).map(b => `<div class="autocomplete-item" onclick="_addZoneTag('${inputId}','${b}')" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">${b}</div>`).join('');
  });
}
function _addZoneTag(inputId, barrio) {
  const inp = document.getElementById(inputId);
  const tagsEl = inp.closest('.form-col').querySelector('.zone-tags');
  const hiddenEl = inp.closest('.form-col').querySelector('input[type=hidden]');
  if (!tagsEl || !hiddenEl) return;
  // Check not duplicate
  const existing = (hiddenEl.value||'').split(',').filter(Boolean);
  if (existing.includes(barrio)) return;
  existing.push(barrio);
  hiddenEl.value = existing.join(',');
  tagsEl.innerHTML = existing.map(z => `<span style="display:inline-flex;align-items:center;gap:4px;background:${inputId.includes('evitar')?'var(--color-error-bg)':'var(--color-gold-bg)'};color:${inputId.includes('evitar')?'var(--color-error)':'var(--color-gold-dark)'};padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500">${z} <span style="cursor:pointer;font-size:14px" onclick="_removeZoneTag('${inputId}','${z}')">×</span></span>`).join(' ');
  inp.value = '';
  inp.nextElementSibling.innerHTML = '';
}
function _removeZoneTag(inputId, barrio) {
  const inp = document.getElementById(inputId);
  const hiddenEl = inp.closest('.form-col').querySelector('input[type=hidden]');
  const existing = (hiddenEl.value||'').split(',').filter(Boolean).filter(z => z !== barrio);
  hiddenEl.value = existing.join(',');
  _addZoneTag(inputId, ''); // refresh display — actually let me just trigger re-render
  const tagsEl = inp.closest('.form-col').querySelector('.zone-tags');
  tagsEl.innerHTML = existing.map(z => `<span style="display:inline-flex;align-items:center;gap:4px;background:${inputId.includes('evitar')?'var(--color-error-bg)':'var(--color-gold-bg)'};color:${inputId.includes('evitar')?'var(--color-error)':'var(--color-gold-dark)'};padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500">${z} <span style="cursor:pointer;font-size:14px" onclick="_removeZoneTag('${inputId}','${z}')">×</span></span>`).join(' ');
}

async function submitDemanda() {
  const form = document.getElementById('demanda-form');
  const btn = document.getElementById('btn-save-demanda');
  btn.disabled = true; btn.textContent = 'Guardando…';
  try {
    const fd = new FormData(form);
    const tipoOrigen = fd.get('tipo_origen') || 'colaborador';
    let clienteId = null, nombre = '';
    nombre = fd.get('nombre') || '';
    if (!nombre) throw new Error('El nombre es obligatorio');
    if (tipoOrigen === 'comprador_directo') {
      const cId = genId();
      const { error: cErr } = await sb.from('clientes').insert({ id: cId, nombre, email: fd.get('email_dir')||null, telefono: fd.get('tel_dir')||null, tipo: 'comprador', estado: 'activo', fecha_alta: new Date().toISOString(), asesor_asignado: currentUser.id });
      if (cErr) throw cErr;
      clienteId = cId;
    }
    const colaboradorId = fd.get('colaborador_id') || null;
    const dId = genId();
    const { error } = await sb.from('demandas').insert({
      id: dId, nombre, zona_preferida: fd.get('zona_preferida')||null,
      presupuesto_max: parseFloat(fd.get('presupuesto_max'))||null,
      habitaciones_min: parseInt(fd.get('habitaciones_min'))||null,
      metros_min: parseInt(fd.get('metros_min'))||null,
      tipo_origen: tipoOrigen, asesor_id: currentUser.id,
      cliente_id: clienteId, colaborador: colaboradorId ? [colaboradorId] : null,
      estado: 'activa', estado_matching: 'pendiente', fecha_alta: new Date().toISOString(),
      peso_zona: parseInt(fd.get('peso_zona'))||80,
      peso_habitaciones: parseInt(fd.get('peso_habitaciones'))||70,
      peso_metros: parseInt(fd.get('peso_metros'))||60,
      peso_ascensor: parseInt(fd.get('peso_ascensor'))||40,
      peso_terraza: parseInt(fd.get('peso_terraza'))||30,
      peso_parking: parseInt(fd.get('peso_parking'))||30,
      peso_estado: parseInt(fd.get('peso_estado'))||50,
      honorarios_comprador_pct: parseFloat(fd.get('honorarios_comprador_pct'))||null,
      no_cobra_comprador: !!fd.get('no_cobra_comprador'),
      mandato_compra: fd.get('mandato_compra')||null,
    });
    if (error) throw error;
    callN8n('embeddings-run', { demanda_id: dId }).catch(() => {});
    toast('✅ Demanda creada. Generando embeddings…'); closeModal();
    loadedTabs.delete('demandas'); TAB_LOADERS.demandas();
  } catch(e) { toast('Error: ' + e.message, 'error'); btn.disabled = false; btn.textContent = 'Guardar demanda'; }
}

function handlePhotoDrop(e) { e.preventDefault(); document.getElementById('photo-dropzone').classList.remove('drag-over'); handlePhotosUpload(Array.from(e.dataTransfer.files)); }
function handlePhotosSelect(input) { handlePhotosUpload(Array.from(input.files)); input.value = ''; }
async function handlePhotosUpload(files) {
  const remaining = 20 - uploadedPhotos.length;
  if (remaining <= 0) { toast('Máximo 20 fotos', 'error'); return; }
  files = files.slice(0, remaining);
  const prog = document.getElementById('photo-progress'); const bar = document.getElementById('photo-progress-bar');
  if (prog) prog.style.display = 'block';
  if (bar) bar.style.width = '30%';
  // Upload all in parallel — 10x faster than sequential
  const results = await Promise.allSettled(files.map(f => uploadToCloudinary(f, 'onoma/pisos')));
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      const res = r.value;
      uploadedPhotos.push({ url: res.secure_url, thumbnail: res.secure_url.replace('/upload/', '/upload/c_fill,w_200,h_150/'), public_id: res.public_id });
    } else { toast('Error foto: ' + r.reason.message, 'error'); }
  });
  if (bar) bar.style.width = '100%';
  renderPhotoPreviews();
  setTimeout(() => { if (prog) { prog.style.display = 'none'; if (bar) bar.style.width = '0%'; } }, 500);
}
function renderPhotoPreviews() {
  const c = document.getElementById('photo-previews'); if (!c) return;
  c.innerHTML = uploadedPhotos.map((p, i) => `<div class="photo-preview"><img src="${p.thumbnail}" alt="Foto"><button class="remove-photo" onclick="removePhoto(${i})">×</button></div>`).join('');
}
function removePhoto(idx) { uploadedPhotos.splice(idx, 1); renderPhotoPreviews(); }

      documentos: Object.keys(docsObj).length ? docsObj : null,
      encargo_venta: uploadedDocs.encargo?.url || null,
      planos: uploadedDocs.planos?.url || null,
      video: fd.get('video')||null, descripcion_ia: fd.get('descripcion_ia')||null,
      asesor_piso: [currentUser.id], colaborador: colaboradorId ? [colaboradorId] : null,
      comparte: form.querySelector('[name=comparte]')?.checked ? 'sí' : 'no',
      honorarios_vendedor_pct: parseFloat(fd.get('honorarios_vendedor_pct'))||null,
      urban_flip: !!urbanFlip, info_veraz: true, estado_sistema: 'activo',
      caracteristicas_libres: fd.get('caracteristicas_libres')||null,
      horarios_visita: (() => {
        const h = {};
        if (form.querySelector('[name=hor_cualquier]')?.checked) h.cualquier = true;
        if (form.querySelector('[name=hor_mananas]')?.checked) h.mananas = true;
        if (form.querySelector('[name=hor_tardes]')?.checked) h.tardes = true;
        if (form.querySelector('[name=hor_1dia]')?.checked) h.antelacion_dias = 1;
        if (form.querySelector('[name=hor_2dias]')?.checked) h.antelacion_dias = Math.max(h.antelacion_dias||0, 2);
        if (form.querySelector('[name=hor_finde]')?.checked) h.fines_de_semana = true;
        const cp = fd.get('hor_personalizado'); if (cp) h.personalizado = cp;
        return Object.keys(h).length ? h : null;
      })(),
    });
    if (error) throw error;
    callN8n('embeddings-run', { piso_id: pisoId }).catch(() => {});
    toast(`✅ Piso${urbanFlip?' Urban Flip':''} guardado`); closeModal();
    loadedTabs.delete('pisos'); TAB_LOADERS.pisos();
  } catch(e) { toast('Error: ' + e.message, 'error'); btn.disabled = false; btn.textContent = urbanFlip ? '⭐ Guardar Urban Flip' : 'Guardar piso'; }
}

      <div class="form-row">
        <div class="form-col"><label>Nombre *</label><input type="text" name="nombre" required placeholder="Ana García"></div>
        <div class="form-col"><label>Email *</label><input type="email" name="email" required placeholder="ana@onomahomes.com"></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-col"><label>Teléfono</label><input type="tel" name="telefono" placeholder="+34 600 000 000"></div>
        <div class="form-col"><label>Contraseña temporal</label><input type="text" name="password" placeholder="onoma2024" value="onoma${new Date().getFullYear()}"></div>
      </div>
    </div>
    <div class="alert alert-info">ℹ️ Se enviará un email con las credenciales de acceso al CRM.</div>
  </form>`, 'md', `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btn-save-asesor" onclick="submitAsesor()">Crear asesor</button>`);
  setupFormV('asesor-form', { nombre:'nombre', email:'email', telefono:'telefono' }, 'btn-save-asesor');

async function submitAsesor() {
  const form = document.getElementById('asesor-form');
  if (vScrollFirst('asesor-form')) return;
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const btn = document.getElementById('btn-save-asesor');
  btn.disabled = true; btn.textContent = 'Creando…';
  const fd = new FormData(form);
  const nombre = fd.get('nombre'), email = fd.get('email'), telefono = fd.get('telefono')||null, password = fd.get('password')||'onoma2026';

  // Plan A: via n8n webhook
  try {
    const result = await callN8n('crear-asesor', { nombre, email, telefono, password });
    if (result.error) throw new Error(result.error);
    toast('✅ Asesor creado. Email enviado.'); closeModal();
    loadedTabs.delete('equipo'); if (TAB_LOADERS.equipo) TAB_LOADERS.equipo();
    return;
  } catch(e) {
    console.warn('Webhook crear-asesor falló, usando Plan B directo:', e.message);
  }

  // Plan B: directo vía Supabase Auth + INSERT
  btn.textContent = 'Creando (directo)…';
  try {
    // 1. Create Supabase Auth user
    const { data: authData, error: authErr } = await sb.auth.admin?.createUser
      ? await sb.auth.admin.createUser({ email, password, email_confirm: true })
      : await sb.auth.signUp({ email, password });
    const authId = authData?.user?.id || authData?.id || null;
    if (authErr && !authErr.message.includes('already')) throw new Error('Auth: ' + authErr.message);

    // 2. INSERT into asesores table
    const newId = genId();
    const { error: dbErr } = await sb.from('asesores').insert({
      id: newId, nombre, email, telefono, rol: 'asesor', activo: true,
      supabase_auth_id: authId
    });
    if (dbErr) throw new Error('DB: ' + dbErr.message);

    // 3. Try to send email (non-blocking)
    callN8n('send-email', {
      to: email, subject: 'Bienvenido a ONOMA CRM',
      html: `<p>Hola ${nombre},</p><p>Se ha creado tu cuenta de asesor en ONOMA Real Estate CRM.</p><p><strong>Email:</strong> ${email}<br><strong>Contraseña:</strong> ${password}</p><p><a href="https://onomahomes.github.io/app.html" style="display:inline-block;background:#A6896E;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700">Acceder al CRM</a></p>`
    }).catch(() => {});

    toast('✅ Asesor creado (modo directo). Credenciales: ' + email + ' / ' + password); closeModal();
    loadedTabs.delete('equipo'); if (TAB_LOADERS.equipo) TAB_LOADERS.equipo();
  } catch(e) { toast('Error: ' + e.message, 'error'); btn.disabled = false; btn.textContent = 'Crear asesor'; }
}

// ─── FORM VALIDATION SYSTEM ──────────────────────────
const V = {
  nombre:    { re: /^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s\-']+$/, msg: 'Solo letras, espacios, guiones y acentos' },
  telefono:  { re: /^[+\d\s\-()]{6,20}$/, msg: 'Solo números, espacios, +, - y (). Mínimo 6 dígitos' },
  email:     { re: /^[^\s@]+@[^\s@]+\.[^\s@]+$/, msg: 'Formato de email no válido' },
  nif:       { fn: v => { if (/^\d{8}[A-Za-z]$/.test(v)||/^[XYZxyz]\d{7}[A-Za-z]$/.test(v)||/^[A-HJNPQRSUVWa-hjnpqrsuvw]\d{7}[\dA-Za-z]$/.test(v)) return true; return v.length >= 5 ? 'warn' : false; }, msg: 'Formato no reconocido como DNI/NIE/CIF. Se guardará igualmente (ej: pasaporte)' },
  refcat:    { fn: v => /^[A-Za-z0-9]{20}$/.test(v), msg: 'Exactamente 20 caracteres alfanuméricos' },
  precio:    { fn: v => /^\d+(\.\d+)?$/.test(v) && parseFloat(v) > 0, msg: 'Solo números, mayor que 0' },
  numPos:    { fn: v => v === '' || (/^\d+$/.test(v) && parseInt(v) >= 0), msg: 'Solo números positivos' },
  anio:      { fn: v => v === '' || (/^\d{4}$/.test(v) && parseInt(v) >= 1000 && parseInt(v) <= new Date().getFullYear()), msg: 'Año entre 1000 y ' + new Date().getFullYear() },
  url:       { fn: v => v === '' || /^https?:\/\/.+/.test(v), msg: 'Debe empezar con http:// o https://' },
  direccion: { re: /^[a-zA-Z0-9áéíóúÁÉÍÓÚñÑüÜ\s,.\-ºª/]+$/, msg: 'Letras, números, espacios, comas, puntos, guiones' },
  presupuesto: { fn: v => v === '' || (/^\d+(\.\d+)?$/.test(v) && parseFloat(v) > 0), msg: 'Solo números, mayor que 0' },
};

function vErr(input, msg) {
  input.style.borderColor = '#e05252';
  let el = input.parentElement.querySelector('.v-err');
  if (!el) { el = document.createElement('div'); el.className = 'v-err'; el.style.cssText = 'color:#e05252;font-size:11px;margin-top:3px;'; input.parentElement.appendChild(el); }
  el.textContent = msg;
}
function vOk(input) {
  input.style.borderColor = '';
  const el = input.parentElement.querySelector('.v-err');
  if (el) el.remove();
}
function vCheck(input, rule) {
  const v = input.value.trim();
  if (!v && !input.required) { vOk(input); return true; }
  if (!v && input.required) { vErr(input, 'Campo obligatorio'); return false; }
  const r = V[rule];
  if (!r) return true;
  const ok = r.fn ? r.fn(v) : r.re.test(v);
  if (ok === 'warn') { input.classList.remove('valid','invalid'); input.style.borderColor='var(--color-warning)'; input.style.background='rgba(184,134,11,0.04)'; const ex=input.parentElement.querySelector('.v-msg'); if(ex)ex.textContent=r.msg; else { const m=document.createElement('div'); m.className='v-msg'; m.style.cssText='font-size:11px;color:var(--color-warning);margin-top:2px'; m.textContent=r.msg; input.parentElement.appendChild(m); } return true; }
  ok ? vOk(input) : vErr(input, r.msg);
  return ok;
}

function setupFormV(formId, rules, submitBtnId) {
  setTimeout(() => {
    const form = document.getElementById(formId);
    if (!form) return;
    Object.entries(rules).forEach(([name, rule]) => {
      const inputs = form.querySelectorAll(`[name="${name}"], #${name}`);
      inputs.forEach(input => {
        if (input.type === 'hidden' || input.type === 'checkbox' || input.type === 'file') return;
        input.addEventListener('input', () => { vCheck(input, rule); vUpdateBtn(formId, rules, submitBtnId); });
        input.addEventListener('blur', () => vCheck(input, rule));
      });
    });
  }, 100);
}

function vUpdateBtn(formId, rules, submitBtnId) {
  const form = document.getElementById(formId);
  const btn = document.getElementById(submitBtnId);
  if (!form || !btn) return;
  let valid = true;
  Object.entries(rules).forEach(([name, rule]) => {
    const input = form.querySelector(`[name="${name}"], #${name}`);
    if (!input || input.type === 'hidden' || input.type === 'checkbox' || input.type === 'file') return;
    const v = input.value.trim();
    if (!v && input.required) { valid = false; return; }
    if (v) { const r = V[rule]; if (r && !(r.fn ? r.fn(v) : r.re.test(v))) valid = false; }
  });
  btn.disabled = !valid;
}

function vScrollFirst(formId) {
  const form = document.getElementById(formId);
  if (!form) return false;
  const err = form.querySelector('.v-err');
  if (err) { err.closest('.form-col, .fld-new, .form-section')?.scrollIntoView({ behavior: 'smooth', block: 'center' }); return true; }
  return false;
}
