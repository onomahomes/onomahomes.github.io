<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ONOMA · Crear contraseña</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.logo{text-align:center;margin-bottom:24px}
.logo-txt{font-size:13px;letter-spacing:4px;font-weight:900;color:#e8c97e;background:#1a1a2e;display:inline-block;padding:8px 18px;border-radius:8px}
.subtitle{font-size:15px;color:#666;margin-top:10px;font-weight:600;text-align:center}
.welcome{font-size:17px;font-weight:800;color:#1a1a2e;text-align:center;margin-bottom:6px}
.welcsub{font-size:13px;color:#888;text-align:center;margin-bottom:22px}
.fld{margin-bottom:14px;position:relative}
.fld label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fld input{width:100%;padding:13px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;background:#fafafa;font-family:inherit}
.fld input:focus{border-color:#1a1a2e;background:#fff}
.eye{position:absolute;right:12px;top:36px;cursor:pointer;font-size:18px;color:#bbb;user-select:none}
::placeholder{font-style:italic;color:#bbb}
.req-hint{font-size:11px;color:#bbb;margin-bottom:14px;font-style:italic}
.strength{height:4px;border-radius:2px;margin-top:6px;background:#e8e8e8;overflow:hidden}
.strength-bar{height:100%;width:0;transition:width .3s,background .3s;border-radius:2px}
.btn{width:100%;padding:16px;background:#1a1a2e;color:#e8c97e;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.link{text-align:center;margin-top:16px;font-size:14px;color:#888}
.link a{color:#c9a84c;font-weight:700;text-decoration:none}
.err{background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:11px;font-size:14px;color:#c0392b;margin-bottom:14px;display:none}
.ok-box{text-align:center;padding:10px 0;display:none}
.ok-ico{font-size:52px}
.ok-box h3{margin-top:12px;font-size:18px;font-weight:800;color:#1a1a2e}
.ok-box p{color:#888;margin-top:8px;font-size:14px;line-height:1.5}
.spin{display:inline-block;width:32px;height:32px;border:3px solid #e8e8e8;border-top-color:#1a1a2e;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:20px 0}</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-txt">ONOMA</div></div>

  <div id="loading" class="loading">
    <div class="spin"></div>
    <p style="color:#888;font-size:14px;margin-top:12px">Verificando enlace...</p>
  </div>

  <div id="formPass" style="display:none">
    <div class="welcome" id="welcomeNombre"></div>
    <div class="welcsub" id="welcomeSub"></div>
    <div class="err" id="errMsg"></div>
    <div class="fld">
      <label>Contraseña</label>
      <input id="pass1" type="password" placeholder="Escribe tu contraseña..." oninput="checkStrength()">
      <span class="eye" onclick="toggleVer('pass1',this)">👁</span>
      <div class="strength"><div class="strength-bar" id="strBar"></div></div>
    </div>
    <p class="req-hint">Mínimo 8 caracteres. Usa letras y números.</p>
    <div class="fld">
      <label>Confirmar contraseña</label>
      <input id="pass2" type="password" placeholder="Repite tu contraseña...">
      <span class="eye" onclick="toggleVer('pass2',this)">👁</span>
    </div>
    <button class="btn" id="btnSet" onclick="setPassword()">Guardar contraseña →</button>
  </div>

  <div class="ok-box" id="okBox">
    <div class="ok-ico">🔐</div>
    <h3>¡Contraseña creada!</h3>
    <p>Ya puedes acceder a tu portal con tu email y tu nueva contraseña.</p>
    <a href="portal.html" style="display:inline-block;margin-top:18px;background:#1a1a2e;color:#e8c97e;padding:14px 28px;border-radius:10px;font-weight:800;text-decoration:none">Ir al portal →</a>
  </div>

  <div id="errToken" style="display:none;text-align:center;padding:10px 0">
    <div style="font-size:52px">❌</div>
    <h3 style="margin-top:12px;color:#c0392b">Enlace inválido o expirado</h3>
    <p style="color:#888;margin-top:8px;font-size:14px">Solicita un nuevo enlace desde la página de inicio.</p>
    <a href="portal.html" style="display:inline-block;margin-top:16px;color:#c9a84c;font-weight:700;text-decoration:none">Volver al portal →</a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const isReset = params.get('reset') === '1';
let userEmail = '';

(async () => {
  if (!token) { showErrToken(); return; }
  try {
    const r = await fetch('https://onomahomes.app.n8n.cloud/webhook/colaborador-verificar-token?token=' + encodeURIComponent(token));
    const d = await r.json();
    if (!d.ok) { showErrToken(); return; }
    userEmail = d.email || '';
    document.getElementById('welcomeNombre').textContent = 'Hola, ' + (d.nombre || 'colaborador') + ' 👋';
    document.getElementById('welcomeSub').textContent = isReset ? 'Crea tu nueva contraseña de acceso' : 'Crea tu contraseña para activar tu cuenta';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('formPass').style.display = 'block';
  } catch(e) { showErrToken(); }
})();

function showErrToken() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errToken').style.display = 'block';
}

function toggleVer(id, el) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; el.textContent = '🙈'; }
  else { inp.type = 'password'; el.textContent = '👁'; }
}

function checkStrength() {
  const v = document.getElementById('pass1').value;
  const bar = document.getElementById('strBar');
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
  const widths = ['25%','50%','75%','100%'];
  bar.style.width = score > 0 ? widths[score-1] : '0';
  bar.style.background = score > 0 ? colors[score-1] : '';
}

async function setPassword() {
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  if (p1.length < 8) { err.textContent = 'La contraseña debe tener mínimo 8 caracteres'; err.style.display='block'; return; }
  if (p1 !== p2) { err.textContent = 'Las contraseñas no coinciden'; err.style.display='block'; return; }
  const btn = document.getElementById('btnSet');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const r = await fetch('https://onomahomes.app.n8n.cloud/webhook/colaborador-set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: p1, is_reset: isReset })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('formPass').style.display = 'none';
      document.getElementById('okBox').style.display = 'block';
    } else {
      err.textContent = d.error || 'Error al guardar. Inténtalo de nuevo.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Guardar contraseña →';
    }
  } catch(e) {
    err.textContent = 'Error de conexión.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Guardar contraseña →';
  }
}
</script>
</body></html>
