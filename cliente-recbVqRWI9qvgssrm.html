<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ONOMA · Tus pisos</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;overflow-x:hidden}.slide{min-height:100vh;display:flex;flex-direction:column}.foto-wrap{height:42vh;background:#eee;position:relative;overflow:hidden}.foto-wrap img{width:100%;height:100%;object-fit:cover}.foto-wrap .no-foto{display:flex;align-items:center;justify-content:center;height:100%;font-size:4rem;background:linear-gradient(135deg,#1a1a2e,#16213e)}.piso-info{padding:16px;flex:1}.piso-precio{font-size:1.8rem;font-weight:800;color:#1a1a2e}.piso-loc{color:#555;font-size:.9rem;margin:3px 0 2px;font-weight:600}.piso-dir{color:#aaa;font-size:.8rem;margin-bottom:12px}.datos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.dato-box{background:#f5f5f5;padding:10px 6px;border-radius:10px;text-align:center}.dato-box strong{display:block;font-size:1rem;color:#1a1a2e}.dato-box small{font-size:.75rem;color:#888}.rec-box{background:linear-gradient(135deg,#667eea22,#764ba222);border-left:3px solid #667eea;padding:12px;border-radius:0 10px 10px 0;margin-bottom:10px}.rec-box p{font-size:.88rem;color:#333;margin-top:5px;line-height:1.55}.ent-box{background:#e8f5e9;border-left:3px solid #4CAF50;padding:12px;border-radius:0 10px 10px 0;margin-bottom:80px}.ent-box p{font-size:.88rem;color:#333;margin-top:5px;line-height:1.55}.nav{display:flex;justify-content:center;align-items:center;gap:8px;padding:10px;border-top:1px solid #f0f0f0}.dot{width:10px;height:10px;border-radius:50%;background:#ddd;cursor:pointer;transition:.2s}.dot.on{background:#667eea}.botones{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;background:#fff;box-shadow:0 -2px 12px rgba(0,0,0,.1)}.btn{padding:16px;border:none;border- var idx=0;
var DEMANDA_ID="recbVqRWI9qvgssrm";
var WEBHOOK="https://onomahomes.app.n8n.cloud/webhook/cliente-accion";
function render(i){
idx=i;var p=pisos[i];
var precio=p.precio?p.precio.toLocaleString("es-ES")+"€":"Consultar";
var fotoHtml=p.foto?"<img src='"+p.foto+"' loading='lazy'>":"<div class='no-foto'>🏠</div>";
var locHtml=p.barrio?"<div class='piso-loc'>📍 "+p.barrio+"</div><div class='piso-dir'>"+p.direccion+"</div>":"<div class='piso-loc'>📍 "+p.direccion+"</div>";
var recHtml=p.recomendacion?"<div class='rec-box'><strong>💡 Por qué lo recomendamos</strong><p>"+p.recomendacion+"</p></div>":"";
var entHtml=p.entorno?"<div class='ent-box'><strong>🗺 El entorno</strong><p>"+p.entorno+"</p></div>":"";
var dots=pisos.map(function(_,j){return "<div class='dot"+(j===i?" on":"")+"' onclick='render("+j+")'>​</div>";}).join("");
document.getElementById("app").innerHTML=
"<div class='slide'>"+
"<div class='foto-wrap'>"+fotoHtml+"</div>"+
"<div class='piso-info'>"+
"<div class='piso-precio'>"+precio+"</div>"+
locHtml+
"<div class='datos-grid'>"+
"<div class='dato-box'><strong>"+p.habitaciones+"</strong><small>🛏 Hab</small></div>"+
"<div class='dato-box'><strong>"+p.metros+"</strong><small>📏 m²</small></div>"+
"<div class='dato-box'><strong>"+p.estado+"</strong><small>Estado</small></div>"+
"</div>"+
recHtml+entHtml+
"</div>"+
"<div class='nav'>"+dots+"</div>"+
"</div>";
}
function abrirModal(id){
if(id==="modalDescartar"){document.getElementById("motivo").value="";}
document.getElementById(id).classList.add("on");
}
function cerrar(id){document.getElementById(id).classList.remove("on");}
function send(data,modalId){
fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
.then(function(r){return r.json();})
.then(function(){
cerrar(modalId);
var next=idx+1;
if(next<pisos.length){render(next);}
else{
document.getElementById("app").innerHTML="<div style='padding:60px 24px;text-align:center'><p style='font-size:3rem'>🎉</p><p style='font-size:1.2rem;font-weight:700;margin-top:16px;color:#1a1a2e'>Gracias por tus respuestas</p><p style='font-size:.9rem;color:#777;margin-top:8px'>Tu asesor te contactará pronto.</p></div>";
document.getElementById("botones").style.display="none";
}
}).catch(function(){alert("Error al enviar");});
}
function confirmarVisita(){
var f=document.getElementById("fecha").value;var h=document.getElementById("hora").value;
if(!f){alert("Selecciona una fecha");return;}
send({piso_id:pisos[idx].id,demanda_id:DEMANDA_ID,accion:"VISITAR",fecha:f,hora:h},"modalVisitar");
}
function confirmarDescarte(){
var m=document.getElementById("motivo").value;
if(!m.trim()){alert("Escribe un motivo");return;}
send({piso_id:pisos[idx].id,demanda_id:DEMANDA_ID,accion:"DESCARTAR",motivo:m},"modalDescartar");
}
render(0);</script></body></html>
