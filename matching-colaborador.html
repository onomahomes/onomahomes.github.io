<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONOMA &mdash; Selecci&oacute;n de pisos</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F8F7F4;--card:#FFF;--text:#2D2D2D;--muted:#7A6E66;--border:#D7D6D4;--gold:#C9A84C;--gold-dark:#B8962E;--gold-bg:rgba(201,168,76,.10);--success:#2C5F2E;--success-bright:#1B8A2E;--error:#8B2020;--warning:#B8860B;--accent:var(--gold);--font:'Barlow',sans-serif;--font-ui:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:#232320;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header svg{height:28px;width:120px}
.header-right{display:flex;align-items:center;gap:10px}
.header-right img{height:32px;border-radius:6px}
.close-btn{position:fixed;top:14px;right:14px;z-index:150;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.close-btn:hover{background:white;border-color:var(--gold)}

.container{max-width:680px;margin:0 auto;padding:20px 16px 120px}
.hero{text-align:center;padding:24px 0 20px}
.hero h1{font-family:var(--font-ui);font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.hero p{font-size:14px;color:var(--muted)}
.counter{text-align:center;font-size:14px;color:var(--muted);margin-bottom:20px;font-family:var(--font-ui)}
.counter strong{color:var(--text);font-size:16px}

/* Carousel */
.carousel{position:relative;width:100%;height:220px;overflow:hidden;background:#f3f2ef;cursor:pointer}
.carousel img{width:100%;height:100%;object-fit:cover;display:none}
.carousel img.active{display:block}
.carousel-ph{width:100%;height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f3f2ef,#e8e7e4);font-size:48px;color:var(--muted);gap:6px}
.carousel-ph span{font-size:11px;font-family:var(--font-ui)}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;z-index:2;box-shadow:0 1px 6px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center}
.carousel-prev{left:8px}.carousel-next{right:8px}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;padding:0}
.carousel-dot.active{background:white}
.carousel-counter{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:white;font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--font-ui);z-index:2}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:80vh;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:28px;cursor:pointer;z-index:501}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:12px}.lightbox-next{right:12px}

/* Piso card */
.piso-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:all .2s}
.piso-card.urban-flip{border-color:var(--gold);border-width:2px}
.piso-card.is-selected{border-color:var(--success);box-shadow:0 0 0 1px var(--success)}
.piso-card.eliminado{opacity:.3;pointer-events:none}
.piso-body{padding:16px}
.piso-dir{font-weight:700;font-size:17px;margin-bottom:4px}
.piso-barrio{font-size:13px;color:var(--muted);margin-bottom:8px}
.piso-precio{font-family:var(--font-ui);font-size:24px;font-weight:700;margin-bottom:10px}

/* Badges */
.uf-badge{background:var(--gold);color:#1C1C1C;font-family:var(--font-ui);font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:8px}
.esc-badge{font-family:var(--font-ui);font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:8px;margin-left:6px}
.esc-badge.tripartita{background:rgba(44,95,46,.08);color:var(--success);border:1px solid rgba(44,95,46,.2)}
.esc-badge.broker-onoma{background:rgba(184,134,11,.08);color:var(--warning);border:1px solid rgba(184,134,11,.2)}

/* Pills - BIGGER */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:inline-flex;padding:6px 14px;border-radius:100px;font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:.03em;background:rgba(0,0,0,.05);color:var(--text)}

.score-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.score-row span{font-size:12px;color:var(--muted)}

/* Per-card toggle */
.card-toggle{display:flex;background:#e8e7e4;border-radius:100px;padding:2px;margin-bottom:14px}
.card-toggle button{flex:1;padding:8px 14px;border:none;border-radius:100px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.card-toggle button.active{background:white;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Docs */
.docs-section{margin-bottom:14px}
.docs-title{font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.docs-row{display:flex;gap:8px;flex-wrap:wrap}
.doc-chip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:var(--font-ui);font-weight:500;color:var(--text);background:white;cursor:pointer;text-decoration:none;transition:all .15s}
.doc-chip:hover{border-color:var(--gold);background:var(--gold-bg)}

/* Commission - BIG and exciting */
.comision-box{background:linear-gradient(135deg,rgba(44,95,46,.06),rgba(27,138,46,.04));border:1.5px solid rgba(27,138,46,.2);border-radius:14px;padding:20px;margin-bottom:14px;text-align:center}
.comision-amount{font-family:var(--font-ui);font-size:42px;font-weight:700;color:var(--success-bright);line-height:1}
.comision-pct{font-family:var(--font-ui);font-size:18px;font-weight:700;color:var(--success-bright);margin-top:4px}
.comision-label{font-size:12px;color:var(--success);margin-top:6px;font-weight:500}
.comision-breakdown{margin-top:14px;padding-top:12px;border-top:1px solid rgba(44,95,46,.15);text-align:left}
.comision-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--muted)}
.comision-row .val{font-weight:600;color:var(--text)}

/* Description */
.desc-ia{font-size:13px;line-height:1.6;color:var(--text);background:#f9f8f6;padding:12px;border-radius:8px;border-left:3px solid var(--gold);margin-bottom:14px}

/* Actions */
.actions{display:flex;gap:8px;margin-top:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-select{background:var(--gold);color:#1C1C1C;flex:1}
.btn-select.selected{background:var(--success);color:white}
.btn-remove{background:transparent;color:var(--error);border:1.5px solid rgba(139,32,32,.25);flex:1}
.btn-primary{background:var(--gold);color:#1C1C1C}
.btn-primary:hover{background:var(--gold-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border)}

/* Fixed bar */
.fixed-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--border);padding:14px 20px;display:flex;gap:10px;justify-content:center;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.fixed-bar .btn{padding:14px 24px;font-size:14px}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(35,35,32,.6);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal h3{font-family:var(--font-ui);font-size:17px;font-weight:700;margin-bottom:12px}
textarea{width:100%;font-family:inherit;font-size:13px;padding:10px;border:1.5px solid var(--border);border-radius:8px;resize:vertical}
.link-box{display:flex;gap:8px;align-items:center;background:#f3f2ef;border:1px solid var(--border);border-radius:8px;padding:10px;margin:10px 0}
.link-text{flex:1;font-size:11px;color:var(--gold-dark);word-break:break-all;font-family:monospace}
.reason-opt{display:flex;align-items:center;gap:8px;padding:11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:6px;transition:border-color .15s}
.reason-opt:hover{border-color:var(--gold)}
.reason-opt.selected{border-color:var(--gold);background:var(--gold-bg)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.footer-brand{text-align:center;font-size:11px;color:var(--muted);padding:20px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#232320;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-family:var(--font-ui);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

function toast(msg){var el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2500)}

async function init(){
  var params=new URLSearchParams(location.search);
  var linkHash=params.get('id')||params.get('h');
  if(!linkHash){showError('Link inv\u00E1lido');return}
  try{
    var r1=await sb.from('envios_matching').select('*').eq('link_hash',linkHash).limit(1);
    if(!r1.data||!r1.data.length){showError('Este enlace no es v\u00E1lido o ha expirado');return}
    _envio=r1.data[0];
    if(_envio.estado==='seleccion_completada'){showError('Ya has completado la selecci\u00F3n para este env\u00EDo.');return}
    if(!_envio.abierto_at)await sb.from('envios_matching').update({abierto_at:new Date().toISOString()}).eq('link_hash',linkHash);

    if(_envio.colaborador_id){
      var r2=await sb.from('colaboradores').select('nombre,apellido,empresa,email,logo_empresa,brand_color,tipo_colaboracion').eq('id',_envio.colaborador_id).limit(1);
      if(r2.data&&r2.data[0])_colab=r2.data[0];
    }
    var r3=await sb.from('demandas').select('*').eq('id',_envio.demanda_id).limit(1);
    if(r3.data&&r3.data[0])_demanda=r3.data[0];

    var r4=await sb.from('comisiones_config').select('*');
    (r4.data||[]).forEach(function(c){_comisiones[c.tipo_operacion]=c});

    var matchIds=_envio.matchings_ids||[];
    if(!matchIds.length){showError('No hay pisos en este env\u00EDo');return}
    var r5=await sb.from('matchings').select('id,piso,score_matching,texto_recomendacion,tipo_operacion,estado').in('id',matchIds);
    var pisoIds=(r5.data||[]).map(function(m){var p=Array.isArray(m.piso)?m.piso[0]:m.piso;return p?String(p).replace(/[{}]/g,''):null}).filter(Boolean);
    var r6=await sb.from('pisos').select('id,direccion,barrio,precio,habitaciones,metros,planta,ascensor,terraza,garaje,trastero,estado_inmueble,fotos,descripcion_ia,urban_flip,video,planos,ite,catastro,memoria_calidades,encargo_venta,honorarios_vendedor_pct,tipo_colaboracion').in('id',pisoIds);
    if(r6.error)console.error('Piso query error:',r6.error);
    var pisosMap={};
    (r6.data||[]).forEach(function(p){pisosMap[p.id]=p});

    _pisos=(r5.data||[]).map(function(m){
      var pid=Array.isArray(m.piso)?m.piso[0]:m.piso;
      var pisoId=pid?String(pid).replace(/[{}]/g,''):'';
      _cardModes[m.id]='info';
      return Object.assign({},m,{pisoData:pisosMap[pisoId]||{},pisoId:pisoId});
    }).sort(function(a,b){return(b.score_matching||0)-(a.score_matching||0)});

    // Start with NO pisos selected
    applyBrand();
    render();
    // Pre-generate AI texts
    _pisos.forEach(function(m,i){generateAIText(m,i)});
  }catch(e){
    console.error('Init error:',e);
    showError('Error: '+e.message);
  }
}

function applyBrand(){
  var hdr=document.getElementById('header-right');
  if(_colab.logo_empresa){
    var logo=Array.isArray(_colab.logo_empresa)?(_colab.logo_empresa[0]?_colab.logo_empresa[0].url:''):_colab.logo_empresa;
    if(logo&&typeof logo==='string'&&logo.startsWith('http'))hdr.innerHTML='<img src="'+logo+'">';
  }
  if(_colab.brand_color)document.documentElement.style.setProperty('--accent',_colab.brand_color);
}

function getEscenario(m){
  var p=m.pisoData;
  if(p.urban_flip)return 'urban_flip';
  var tipo=m.tipo_operacion||p.tipo_colaboracion||'';
  if(tipo.toLowerCase().indexOf('tripartita')>=0)return 'tripartita';
  return 'broker_onoma';
}

async function generateAIText(m,idx){
  var p=m.pisoData;
  var prompt='Eres un asesor inmobiliario de lujo de ONOMA Homes en Madrid. Genera una recomendaci\u00F3n detallada de este piso para un colaborador inmobiliario.\n\n';
  prompt+='PISO:\n- Direcci\u00F3n: '+(p.direccion||'')+'\n- Barrio: '+(p.barrio||'')+'\n- Precio: '+eur(p.precio)+'\n- Habitaciones: '+(p.habitaciones||'?')+', Metros: '+(p.metros||'?')+' m\u00B2\n- Planta: '+(p.planta||'?')+', Ascensor: '+(p.ascensor?'S\u00ED':'No')+'\n- Terraza: '+(p.terraza?'S\u00ED':'No')+', Garaje: '+(p.garaje?'S\u00ED':'No')+'\n- Estado: '+(p.estado_inmueble||'No especificado')+'\n';
  if(p.urban_flip)prompt+='- EXCLUSIVO ONOMA (Urban Flip)\n';
  prompt+='\nCLIENTE:\n- Zona deseada: '+(_demanda.zona_preferida||'No especificada')+'\n- Presupuesto: '+eur(_demanda.presupuesto_max)+'\n- Habitaciones m\u00EDnimas: '+(_demanda.habitaciones_min||'?')+'\n- Notas del asesor: '+(_demanda.notas_asesor||'Sin notas')+'\n- Qu\u00E9 valora: '+(_demanda.perfil_valoran||'No especificado')+'\n- Qu\u00E9 no quiere: '+(_demanda.perfil_no_quieren||'No especificado')+'\n';
  prompt+='\nScore de compatibilidad: '+Math.round(m.score_matching||0)+'%\n';
  prompt+='\nEstructura obligatoria:\n1. Descripci\u00F3n del piso (2-3 p\u00E1rrafos: ubicaci\u00F3n, caracter\u00EDsticas, extras, relaci\u00F3n calidad/precio)\n2. Por qu\u00E9 encaja con este cliente (1-2 p\u00E1rrafos)\n3. Puntos fuertes destacados (3-5 bullets con \u2022)\n\nTono profesional dirigido al colaborador. Responde SOLO con el texto, sin comillas ni encabezados.';

  try{
    var resp=await fetch(N8N+'/generate-piso-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,pisoId:m.pisoId,demandaId:_envio.demanda_id})});
    if(resp.ok){var data=await resp.json();var item=Array.isArray(data)?data[0]:data;_aiTexts[m.id]=item&&item.text||''}
  }catch(e){}
  if(!_aiTexts[m.id])_aiTexts[m.id]=m.texto_recomendacion||p.descripcion_ia||'';
  // Update if visible
  var aiEl=document.getElementById('ai-text-'+m.id);
  if(aiEl){aiEl.innerHTML=_aiTexts[m.id];var skel=document.getElementById('ai-skel-'+m.id);if(skel)skel.style.display='none';if(aiEl.parentElement)aiEl.parentElement.style.display=''}
}

  contentHtml+='<div class="counter"><strong>'+valorados+'</strong> de '+totalPisos+' pisos valorados'+(selCount>0?' \u00B7 <span style="color:var(--success)">'+selCount+' seleccionados</span>':'')+((_discarded.size)>0?' \u00B7 <span style="color:var(--error)">'+_discarded.size+' eliminados</span>':'')+'</div>';

    }else{
      contentHtml+='<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:12px">\u26A0\uFE0F</div><p style="font-size:16px;font-weight:600;margin-bottom:6px">Has eliminado todos los pisos</p><p style="color:var(--muted)">Debes seleccionar al menos 1 piso para generar el link</p></div>';
    }

  // Actions

  if(!isElim){

// Carousel
function cDir(mid,dir){var c=document.getElementById('carousel-'+mid);if(!c)return;var imgs=c.querySelectorAll('img');var dots=c.querySelectorAll('.carousel-dot');var counter=c.querySelector('.carousel-counter');var cur=Array.from(imgs).findIndex(function(i){return i.classList.contains('active')});imgs[cur].classList.remove('active');if(dots[cur])dots[cur].classList.remove('active');cur=(cur+dir+imgs.length)%imgs.length;imgs[cur].classList.add('active');if(dots[cur])dots[cur].classList.add('active');if(counter)counter.textContent=(cur+1)+' / '+imgs.length}
function cSlide(mid,idx){var c=document.getElementById('carousel-'+mid);if(!c)return;c.querySelectorAll('img').forEach(function(img,i){img.classList.toggle('active',i===idx)});c.querySelectorAll('.carousel-dot').forEach(function(d,i){d.classList.toggle('active',i===idx)});var counter=c.querySelector('.carousel-counter');if(counter)counter.textContent=(idx+1)+' / '+c.querySelectorAll('img').length}

function closeLB(){document.getElementById('lightbox').classList.remove('open')}

async function confirmDiscard(){
  var notes=document.getElementById('discard-notes').value.trim();
  var feedback=_discardReason+(notes?': '+notes:'');
  _discarded.add(_discardingId);_selected.delete(_discardingId);
  try{
    await sb.from('matchings').update({estado:'descartado_colaborador',feedback_descarte_asesor:feedback}).eq('id',_discardingId);
    var prevFb=_envio.feedback_descarte||{};prevFb[_discardingId]=feedback;
    await sb.from('envios_matching').update({matchings_descartados:Array.from(_discarded),feedback_descarte:prevFb}).eq('link_hash',_envio.link_hash);
  }catch(e){console.warn(e)}
  closeModal('discard-modal');toast('\u274C Piso eliminado');
  var card=document.getElementById('card-'+_discardingId);
  if(card){card.style.transition='opacity 0.3s, transform 0.3s';card.style.opacity='0';card.style.transform='translateX(-30px)';setTimeout(function(){render()},350)}
  else render();
}

async function generarLinkCliente(){
  var selIds=Array.from(_selected);if(!selIds.length)return;
  var btn=document.querySelector('.fixed-bar .btn');btn.disabled=true;btn.textContent='Generando...';
  var newHash=Math.random().toString(36).substring(2,14);
  try{
    await sb.from('envios_matching').update({matchings_seleccionados:selIds,estado:'seleccion_completada',completado_at:new Date().toISOString()}).eq('link_hash',_envio.link_hash);
    await sb.from('envios_matching').insert({link_hash:newHash,tipo:'colaborador_a_cliente',asesor_id:_envio.asesor_id,colaborador_id:_envio.colaborador_id,demanda_id:_envio.demanda_id,cliente_nombre:_demanda.nombre,cliente_email:_demanda.email_dir||null,matchings_ids:selIds,estado:'enviado'});
    await sb.from('demandas').update({ultimo_matching_enviado:new Date().toISOString()}).eq('id',_envio.demanda_id);
    await sb.from('acciones_pendientes').insert({asesor_id:_envio.asesor_id,tipo:'matching_enviado_cliente',titulo:'Matchings enviados al cliente \u2014 '+(_demanda.nombre||''),descripcion:([_colab.nombre,_colab.apellido].filter(Boolean).join(' ')||'Colaborador')+' seleccion\u00F3 '+selIds.length+' pisos.',referencia_id:_envio.demanda_id,estado:'pendiente',prioridad:'normal'});
  }catch(e){console.warn(e)}

  var clienteLink=GH_PAGES+'/matching-cliente.html?id='+newHash;
  var colabName=[_colab.nombre,_colab.apellido].filter(Boolean).join(' ')||'Tu asesor';
  var clienteNombre=_demanda.nombre||'tu cliente';
  var selPisos=_pisos.filter(function(m){return selIds.indexOf(m.id)>=0});
  var pisosList=selPisos.map(function(m,i){var p=m.pisoData;return '  '+(i+1)+'. '+(p.direccion||'')+' \u2014 '+eur(p.precio)+' \u00B7 '+(p.habitaciones||'?')+' hab \u00B7 '+(p.metros||'?')+' m\u00B2 ('+(p.barrio||'')+')'}).join('\n');

  var aiMsg='';
  try{
    var prompt='Genera un mensaje breve (5-8 l\u00EDneas) de un asesor inmobiliario a un comprador explicando pisos seleccionados. Perfil: zona '+(_demanda.zona_preferida||'')+', presupuesto '+eur(_demanda.presupuesto_max)+', '+(_demanda.habitaciones_min||'')+'+ hab. Pisos:\n'+pisosList+'\n\nTono cercano. Incluye link: '+clienteLink+'\nResponde SOLO el mensaje.';
    var resp=await fetch(N8N+'/generate-piso-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})});
    if(resp.ok){var data=await resp.json();var item=Array.isArray(data)?data[0]:data;aiMsg=item&&item.text||''}
  }catch(e){}
  if(!aiMsg)aiMsg='Hola '+clienteNombre+',\n\n'+colabName+' ha seleccionado '+selIds.length+' pisos que encajan con lo que buscas:\n\n'+pisosList+'\n\nRev\u00EDsalos aqu\u00ED:\n'+clienteLink+'\n\nUn saludo';

  var emailTo=_demanda.email_dir||'';
  var emailSubject=encodeURIComponent('Selecci\u00F3n de pisos \u2014 '+colabName);
  document.getElementById('envio-modal-content').innerHTML='<button onclick="closeModal(\'envio-modal\')" style="position:absolute;top:14px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1">&times;</button><h3 style="padding-right:30px">Link para tu cliente</h3><p style="font-size:13px;color:var(--muted);margin-bottom:12px">'+selIds.length+' pisos seleccionados para '+clienteNombre+'</p><textarea id="client-msg" rows="10">'+aiMsg+'</textarea><div class="link-box"><span class="link-text">'+clienteLink+'</span><button class="btn btn-secondary" style="font-size:11px;padding:6px 12px" onclick="navigator.clipboard.writeText(\''+clienteLink+'\');toast(\'Link copiado\')">Copiar</button></div><div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById(\'client-msg\').value);toast(\'Mensaje copiado\')">Copiar mensaje</button><button class="btn btn-primary" onclick="window.open(\'mailto:'+emailTo+'?subject='+emailSubject+'&body=\'+encodeURIComponent(document.getElementById(\'client-msg\').value))">Enviar por Email</button></div><button class="btn btn-primary" style="width:100%;margin-top:14px;padding:14px" onclick="closeModal(\'envio-modal\');toast(\'\u2705 Env\u00EDo completado\')">\u2705 Listo</button>';
  document.getElementById('envio-modal').classList.add('open');
  btn.disabled=false;btn.textContent='Generar link para mi cliente ('+selIds.length+' pisos)';
}

function closeModal(id){document.getElementById(id).classList.remove('open')}
function showError(msg){document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:48px;margin-bottom:12px">\u26A0\uFE0F</div><p style="font-size:16px;color:var(--muted)">'+msg+'</p></div>'}
document.addEventListener('keydown',function(e){if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1)});
init();
</script>
</body>
</html>
