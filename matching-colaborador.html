<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONOMA — Selección de pisos</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #F5F4F1; --card: #FFFFFF; --text: #1C1C1C; --muted: #7A6E66; --border: #D7D6D4;
  --gold: #C9A84C; --gold-dark: #B8962E; --gold-bg: rgba(201,168,76,0.10);
  --success: #2C5F2E; --error: #8B2020; --warning: #B8860B;
  --accent: var(--gold); --font: 'Barlow', sans-serif; --font-ui: 'Jost', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.header { background: #232320; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.header-logo { height: 28px; }
.header-colab { display: flex; align-items: center; gap: 10px; }
.header-colab img { height: 32px; border-radius: 6px; }
.header-colab span { color: rgba(255,255,255,0.6); font-size: 12px; font-family: var(--font-ui); }
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px 100px; }
.hero { text-align: center; padding: 28px 0 20px; }
.hero h1 { font-family: var(--font-ui); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.hero p { font-size: 14px; color: var(--muted); }
.toggle { display: flex; background: #e8e7e4; border-radius: 100px; padding: 3px; margin: 0 auto 24px; max-width: 320px; }
.toggle button { flex: 1; padding: 10px 16px; border: none; border-radius: 100px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.2s; }
.toggle button.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.counter { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.counter strong { color: var(--text); }
.piso-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
.piso-card.urban-flip { border-color: var(--gold); }
.piso-card.eliminado { opacity: 0.4; }
.piso-img { width: 100%; height: 200px; object-fit: cover; }
.piso-img-ph { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; background: #f3f2ef; font-size: 56px; }
.piso-body { padding: 16px; }
.piso-dir { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.piso-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.piso-precio { font-family: var(--font-ui); font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.pill { display: inline-flex; padding: 3px 10px; border-radius: 100px; font-family: var(--font-ui); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: rgba(0,0,0,0.05); color: var(--muted); }
.pill-gold { background: var(--gold-bg); color: var(--gold-dark); border: 1px solid rgba(201,168,76,0.3); }
.pill-green { background: rgba(44,95,46,0.08); color: var(--success); }
.score-ring { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.desc-ia { font-size: 13px; line-height: 1.6; color: var(--text); background: #f9f8f6; padding: 12px; border-radius: 8px; border-left: 3px solid var(--gold); margin-bottom: 12px; }
.uf-badge { background: var(--gold); color: #1C1C1C; font-family: var(--font-ui); font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
.comision-box { background: var(--gold-bg); border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 14px; margin-top: 10px; }
.comision-big { font-family: var(--font-ui); font-size: 28px; font-weight: 700; color: var(--gold-dark); }
.comision-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
.actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 6px; font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em; }
.btn-select { background: var(--gold); color: #1C1C1C; flex: 1; }
.btn-select.selected { background: var(--success); color: white; }
.btn-remove { background: transparent; color: var(--error); border: 1.5px solid rgba(139,32,32,0.25); flex: 1; }
.btn-remove:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: #1C1C1C; }
.btn-secondary { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
.fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1.5px solid var(--border); padding: 14px 20px; display: flex; gap: 10px; justify-content: center; z-index: 100; box-shadow: 0 -4px 16px rgba(0,0,0,0.08); }
.fixed-bar .btn { padding: 14px 24px; font-size: 14px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(35,35,32,0.6); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 12px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; }
.modal h3 { font-family: var(--font-ui); font-size: 17px; font-weight: 700; margin-bottom: 12px; }
textarea { width: 100%; font-family: inherit; font-size: 13px; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; resize: vertical; }
.link-box { display: flex; gap: 8px; align-items: center; background: #f3f2ef; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 10px 0; }
.link-text { flex: 1; font-size: 11px; color: var(--gold-dark); word-break: break-all; font-family: monospace; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer-brand { text-align: center; font-size: 11px; color: var(--muted); padding: 20px; margin-bottom: 80px; }
.expand-btn { font-size: 12px; color: var(--gold-dark); cursor: pointer; margin-top: 8px; background: none; border: none; font-family: var(--font-ui); font-weight: 500; }
</style>
</head>
<body>

<!-- Envio modal -->
<div class="modal-overlay" id="envio-modal">
  <div class="modal" id="envio-modal-content"></div>

<script>
const SB_URL = 'https://wwaytwudfbwxttyyojjx.supabase.co';
const SB_KEY = 'sb_publishable_JuEWwJe_kuMRKckfQJ0LSw_J3SIDf_b';
const sb = supabase.createClient(SB_URL, SB_KEY);
const GH_PAGES = 'https://onomahomes.github.io';

let _envio = null, _pisos = [], _colab = {}, _demanda = {}, _selected = new Set(), _discarded = new Set();
let _discardingId = null, _viewMode = 'cliente';

function eur(n) { return n ? '€' + Number(n).toLocaleString('es-ES') : '—'; }

async function init() {
  const params = new URLSearchParams(location.search);
  const linkHash = params.get('id') || params.get('h');
  if (!linkHash) { showError('Link inválido'); return; }

  try {
    // Load envio
    const { data: envios } = await sb.from('envios_matching').select('*').eq('link_hash', linkHash).limit(1);
    if (!envios || !envios.length) { showError('Este enlace no es válido o ha expirado'); return; }
    _envio = envios[0];

    // Mark as opened
    if (!_envio.abierto_at) {
      await sb.from('envios_matching').update({ abierto_at: new Date().toISOString() }).eq('link_hash', linkHash);
    }

    // Load collaborator
    if (_envio.colaborador_id) {
      const { data: cd } = await sb.from('colaboradores').select('nombre,apellido,empresa,email,logo_empresa,brand_color').eq('id', _envio.colaborador_id).limit(1);
      if (cd && cd[0]) _colab = cd[0];
    }

    // Load demanda
    const { data: dd } = await sb.from('demandas').select('*').eq('id', _envio.demanda_id).limit(1);
    if (dd && dd[0]) _demanda = dd[0];

    // Load matchings + pisos
    const matchIds = _envio.matchings_ids || [];
    if (!matchIds.length) { showError('No hay pisos en este envío'); return; }
    const { data: matchings } = await sb.from('matchings').select('id,piso,score_matching,texto_recomendacion,tipo_operacion,split_calculado,estado').in('id', matchIds);

    const pisoIds = (matchings||[]).map(m => { const p = Array.isArray(m.piso)?m.piso[0]:m.piso; return p?String(p).replace(/[{}]/g,''):null; }).filter(Boolean);
    const { data: pisosData } = await sb.from('pisos').select('id,direccion,barrio,precio,habitaciones,metros,ascensor,terraza,garaje,trastero,estado_inmueble,fotos,descripcion_ia,urban_flip,planos,video,documentos,encargo_venta,honorarios_vendedor_pct').in('id', pisoIds);
    const pisosMap = {};
    (pisosData||[]).forEach(p => { pisosMap[p.id] = p; });

    _pisos = (matchings||[]).map(m => {
      const pid = Array.isArray(m.piso)?m.piso[0]:m.piso;
      const pisoId = pid?String(pid).replace(/[{}]/g,''):'';
      return { ...m, pisoData: pisosMap[pisoId]||{}, pisoId };
    }).sort((a,b) => (b.score_matching||0)-(a.score_matching||0));

    // Init selected (all selected by default)
    _pisos.forEach(m => _selected.add(m.id));

    // Apply brand
    applyBrand();
    render();
  } catch(e) { showError('Error: ' + e.message); }
}

function applyBrand() {
  const hdr = document.getElementById('header-colab');
  if (_colab.logo_empresa) {
    const logo = Array.isArray(_colab.logo_empresa) ? _colab.logo_empresa[0]?.url : _colab.logo_empresa;
    if (logo) hdr.innerHTML = `<img src="${logo}">`;
  }
  if (_colab.brand_color) {
    document.documentElement.style.setProperty('--accent', _colab.brand_color);
  }
}

function render() {
  const selCount = _selected.size;
  const total = _pisos.length;
  const clienteNombre = _demanda.nombre || 'tu cliente';

  document.getElementById('main-content').innerHTML = `
    <div class="hero">
      <h1>Pisos para ${clienteNombre}</h1>
      <p>${_demanda.zona_preferida||''} · ${eur(_demanda.presupuesto_max)} · ${_demanda.habitaciones_min||''}+ hab</p>
    </div>
    <div class="toggle">
      <button class="${_viewMode==='cliente'?'active':''}" onclick="_viewMode='cliente';render()">📋 Info Cliente</button>
      <button class="${_viewMode==='honorarios'?'active':''}" onclick="_viewMode='honorarios';render()">💰 Mis Honorarios</button>
    </div>
    <div class="counter"><strong>${selCount}</strong> de ${total} pisos seleccionados para enviar</div>
    ${_pisos.map(m => renderCard(m)).join('')}
    <div class="footer-brand">Presentado por ${_colab.empresa || [_colab.nombre,_colab.apellido].filter(Boolean).join(' ') || 'ONOMA Homes'} en colaboración con ONOMA Homes</div>
  `;

  // Fixed bar
  let bar = document.getElementById('fixed-bar');
  if (!bar) { bar = document.createElement('div'); bar.id='fixed-bar'; bar.className='fixed-bar'; document.body.appendChild(bar); }
  bar.innerHTML = `<button class="btn btn-primary" style="flex:1;max-width:400px" onclick="generarLinkCliente()" ${selCount>0?'':'disabled'}>📧 Generar link para mi cliente (${selCount} pisos)</button>`;
}

function renderCard(m) {
  const p = m.pisoData;
  const isUF = p.urban_flip;
  const isElim = _discarded.has(m.id);
  const isSel = _selected.has(m.id);
  let fotos = p.fotos || [];
  if (typeof fotos === 'string') { try { fotos = JSON.parse(fotos); } catch(e) { fotos = []; } }
  if (!Array.isArray(fotos)) fotos = [];
  const fotoUrl = fotos.length > 0 ? (typeof fotos[0]==='object' ? (fotos[0].url||'') : String(fotos[0])) : '';
  const score = Math.round(m.score_matching||0);

  const imgHtml = fotoUrl && fotoUrl.startsWith('http')
    ? `<img src="${fotoUrl}" class="piso-img" onerror="this.outerHTML='<div class=piso-img-ph>🏠</div>'">`
    : '<div class="piso-img-ph">🏠</div>';

  const pills = [
    p.habitaciones ? p.habitaciones + ' hab' : '',
    p.metros ? p.metros + ' m²' : '',
    p.ascensor ? 'Ascensor' : '',
    p.terraza ? 'Terraza' : '',
    p.garaje ? 'Garaje' : '',
    p.trastero ? 'Trastero' : '',
  ].filter(Boolean).map(t => `<span class="pill">${t}</span>`).join('');

  // Comision calc for honorarios mode
  let comisionHtml = '';
  if (_viewMode === 'honorarios') {
    const tipo = m.tipo_operacion || 'A';
    const precio = p.precio || 0;
    const comTotal = precio * 0.03;
    let miComision = 0, escLabel = '', escColor = '';
    if (isUF) { miComision = precio * 0.02 * 1.21; escLabel = 'Urban Flip 2%+IVA'; escColor = 'var(--gold)'; }
    else if (tipo === 'A') { miComision = 0; escLabel = 'Escenario A — ONOMA directo'; escColor = '#6B7F9E'; }
    else if (tipo === 'B') { miComision = comTotal * 0.6; escLabel = 'Escenario B — 60% broker'; escColor = 'var(--success)'; }
    else if (tipo === 'C') { miComision = comTotal * 0.6; escLabel = 'Escenario C — 60% broker piso'; escColor = 'var(--warning)'; }
    else if (tipo === 'D') { miComision = comTotal * 0.33; escLabel = 'Escenario D — 33% tripartita'; escColor = 'var(--muted)'; }
    comisionHtml = `<div class="comision-box">
      <div style="font-size:11px;color:${escColor};font-weight:600;margin-bottom:6px">${escLabel}</div>
      <div class="comision-big">${eur(Math.round(miComision))}</div>
      <div class="comision-detail">Comisión total: ${eur(Math.round(comTotal))} (3% de ${eur(precio)})</div>
    </div>`;
  }

  return `<div class="piso-card ${isUF?'urban-flip':''} ${isElim?'eliminado':''}" id="card-${m.id}">
    ${imgHtml}
    <div class="piso-body">
      ${isUF ? '<div class="uf-badge">⭐ EXCLUSIVO ONOMA</div>' : ''}
      <div class="piso-dir">${p.direccion||'—'}</div>
      <div class="piso-meta">${p.barrio||''} · ${p.estado_inmueble||''}</div>
      <div class="piso-precio">${eur(p.precio)}</div>
      <div class="score-ring">
        <svg width="40" height="40" viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#e5e3df" stroke-width="4"/><circle cx="30" cy="30" r="26" fill="none" stroke="var(--gold)" stroke-width="4" stroke-dasharray="${(score/100)*163} 163" transform="rotate(-90 30 30)" stroke-linecap="round"/><text x="30" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="var(--gold)">${score}</text></svg>
        <span style="font-size:12px;color:var(--muted)">Compatibilidad</span>
      </div>
      <div class="pills">${pills}</div>
      ${m.texto_recomendacion ? `<div class="desc-ia">${m.texto_recomendacion}</div>` : (p.descripcion_ia ? `<div class="desc-ia">${p.descripcion_ia}</div>` : '')}
      ${comisionHtml}
      ${!isElim ? `<div class="actions">
        <button class="btn ${isSel?'btn-select selected':'btn-select'}" onclick="toggleSelect('${m.id}')">${isSel?'✅ Seleccionado':'Seleccionar'}</button>
        ${!isUF ? `<button class="btn btn-remove" onclick="openDiscard('${m.id}')">❌ Eliminar</button>` : ''}
      </div>` : '<div style="text-align:center;padding:10px;color:var(--error);font-size:13px">❌ Eliminado</div>'}
      ${isUF ? '<div style="font-size:11px;color:var(--muted);margin-top:6px">Este piso se incluye automáticamente por ser exclusivo de nuestra cartera</div>' : ''}
    </div>
  </div>`;
}

function toggleSelect(id) {
  if (_selected.has(id)) _selected.delete(id); else _selected.add(id);
  render();
}

function openDiscard(id) {
  _discardingId = id;
  document.getElementById('discard-modal').classList.add('open');
  document.querySelectorAll('input[name="dr"]').forEach(r => r.checked = false);
  document.getElementById('discard-notes').value = '';
}
function closeDiscardModal() { document.getElementById('discard-modal').classList.remove('open'); _discardingId = null; }

async function confirmDiscard() {
  const reason = document.querySelector('input[name="dr"]:checked')?.value;
  if (!reason) { alert('Selecciona un motivo'); return; }
  const notes = document.getElementById('discard-notes').value;
  const feedback = reason + (notes ? ': ' + notes : '');
  _discarded.add(_discardingId);
  _selected.delete(_discardingId);

  // Save to Supabase
  try {
    await sb.from('matchings').update({ estado: 'descartado_colaborador', feedback_descarte_asesor: feedback }).eq('id', _discardingId);
    const prevFb = _envio.feedback_descarte || {};
    prevFb[_discardingId] = feedback;
    const descArr = [..._discarded];
    await sb.from('envios_matching').update({ matchings_descartados: descArr, feedback_descarte: prevFb }).eq('link_hash', _envio.link_hash);
  } catch(e) {}

  closeDiscardModal();
  render();
}

async function generarLinkCliente() {
  const selIds = [..._selected];
  if (!selIds.length) return;

  // Save selection
  const newHash = Math.random().toString(36).substring(2,14);
  try {
    // Update current envio
    await sb.from('envios_matching').update({
      matchings_seleccionados: selIds,
      estado: 'seleccion_completada',
      completado_at: new Date().toISOString()
    }).eq('link_hash', _envio.link_hash);

    // Create new envio for client
    await sb.from('envios_matching').insert({
      link_hash: newHash,
      tipo: 'colaborador_a_cliente',
      colaborador_id: _envio.colaborador_id,
      demanda_id: _envio.demanda_id,
      cliente_nombre: _demanda.nombre,
      cliente_email: _demanda.email_dir || null,
      matchings_ids: selIds,
      estado: 'enviado'
    });

    // Update demanda
    await sb.from('demandas').update({ ultimo_matching_enviado: new Date().toISOString() }).eq('id', _envio.demanda_id);

    // Create accion for asesor
    await sb.from('acciones_pendientes').insert({
      asesor_id: _envio.asesor_id,
      tipo: 'matching_enviado_cliente',
      titulo: '📧 Matchings enviados al cliente — ' + (_demanda.nombre||''),
      descripcion: (_colab.nombre||'Colaborador') + ' seleccionó ' + selIds.length + ' pisos y los envió al comprador.',
      referencia_id: _envio.demanda_id,
      estado: 'pendiente',
      prioridad: 'normal'
    });
  } catch(e) { console.warn(e); }

  const clienteLink = GH_PAGES + '/matching-cliente.html?id=' + newHash;
  const colabName = [_colab.nombre, _colab.apellido].filter(Boolean).join(' ') || 'Tu asesor';
  const clienteNombre = _demanda.nombre || 'tu cliente';
  const msg = 'Hola ' + clienteNombre + ',\n\n' + colabName + ' ha seleccionado ' + selIds.length + ' pisos que encajan con lo que buscas.\n\nRevísalos aquí:\n' + clienteLink + '\n\nSi alguno te interesa, agenda una visita directamente desde el enlace.\n\nUn saludo';

  document.getElementById('envio-modal-content').innerHTML = `
    <h3>📧 Link para tu cliente</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">${selIds.length} pisos seleccionados para ${clienteNombre}</p>
    <textarea id="client-msg" rows="8">${msg}</textarea>
    <div class="link-box"><span class="link-text">${clienteLink}</span><button class="btn btn-secondary" style="font-size:11px;padding:6px 12px" onclick="navigator.clipboard.writeText('${clienteLink}');alert('Link copiado')">Copiar</button></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById('client-msg').value);alert('Mensaje copiado')">📋 Copiar mensaje</button>
      <button class="btn btn-primary" onclick="window.open('mailto:${_demanda.email_dir||''}?subject='+encodeURIComponent('Selección de pisos para ti — '+colabName)+'&body='+encodeURIComponent(document.getElementById('client-msg').value))">📧 Enviar por Email</button>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:14px;padding:14px" onclick="document.getElementById('envio-modal').classList.remove('open')">✅ Listo</button>
  `;
  document.getElementById('envio-modal').classList.add('open');
}

function showError(msg) {
  document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:80px 20px"><div style="font-size:48px;margin-bottom:12px">⚠️</div><p style="font-size:16px;color:var(--muted)">${msg}</p></div>`;
}

init();
</script>
</body>
</html>
