<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONOMA — Pisos seleccionados para ti</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #F8F7F4; --card: #FFFFFF; --text: #2D2D2D; --muted: #7A6E66; --border: #D7D6D4;
  --gold: #C9A84C; --gold-dark: #B8962E; --gold-bg: rgba(201,168,76,0.10);
  --success: #2C5F2E; --error: #8B2020; --warning: #B8860B;
  --font: 'Barlow', sans-serif; --font-ui: 'Jost', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:#232320;padding:16px 20px;text-align:center}
.header svg{height:28px;width:120px}

/* Container */
.container{max-width:640px;margin:0 auto;padding:20px 16px 40px}

/* Progress bar */
.progress-bar-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-family:var(--font-ui);font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-label strong{color:var(--text)}
.progress-track{height:4px;background:#e5e3df;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.4s ease}

/* Hero */
.hero{text-align:center;padding:8px 0 20px}
.hero h1{font-family:var(--font-ui);font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.hero p{font-size:14px;color:var(--muted)}

/* Carousel */
.carousel{position:relative;width:100%;height:280px;overflow:hidden;background:#f3f2ef;border-radius:12px 12px 0 0;cursor:pointer}
.carousel img{width:100%;height:100%;object-fit:cover;display:none}
.carousel img.active{display:block}
.carousel-ph{width:100%;height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f3f2ef 0%,#e8e7e4 100%);font-size:48px;border-radius:12px 12px 0 0;color:var(--muted);gap:8px}
.carousel-ph span{font-size:12px;font-family:var(--font-ui);font-weight:500}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.9);border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center}
.carousel-prev{left:10px}
.carousel-next{right:10px}
.carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.carousel-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.5);border:none;cursor:pointer;padding:0}
.carousel-dot.active{background:white}
.carousel-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);color:white;font-size:11px;padding:3px 8px;border-radius:12px;font-family:var(--font-ui);z-index:2}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:80vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:28px;cursor:pointer;z-index:501}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:white;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:12px}
.lightbox-next{right:12px}
.lightbox-dots{display:flex;gap:6px;margin-top:16px}
.lightbox-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;cursor:pointer;padding:0}
.lightbox-dot.active{background:white}

/* Piso card */
.piso-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.piso-card.urban-flip{border-color:var(--gold)}
.piso-body{padding:16px}
.piso-dir{font-weight:700;font-size:17px;margin-bottom:4px}
.piso-barrio{font-size:13px;color:var(--muted);margin-bottom:10px}
.piso-precio{font-family:var(--font-ui);font-size:26px;font-weight:700;margin-bottom:12px}
.uf-badge{background:var(--gold);color:#1C1C1C;font-family:var(--font-ui);font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:8px}

/* Pills */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{display:inline-flex;padding:4px 10px;border-radius:100px;font-family:var(--font-ui);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;background:rgba(0,0,0,0.05);color:var(--muted)}
.pill-gold{background:var(--gold-bg);color:var(--gold-dark);border:1px solid rgba(201,168,76,0.3)}

/* Score */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.score-row span{font-size:12px;color:var(--muted)}

/* AI text */
.ai-section{margin-bottom:16px}
.ai-title{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--gold-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-text{font-size:13.5px;line-height:1.7;color:var(--text);background:#f9f8f6;padding:14px;border-radius:10px;border-left:3px solid var(--gold)}
.ai-skeleton{background:#f3f2ef;border-radius:10px;padding:16px;margin-bottom:16px}
.ai-skeleton-line{height:12px;background:linear-gradient(90deg,#e8e7e4 25%,#f3f2ef 50%,#e8e7e4 75%);background-size:200%;border-radius:4px;margin-bottom:8px;animation:shimmer 1.5s infinite}
.ai-skeleton-line:last-child{width:60%;margin-bottom:0}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* Docs */
.docs-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.doc-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:var(--font-ui);font-weight:500;color:var(--text);background:white;cursor:pointer;text-decoration:none}
.doc-chip:hover{border-color:var(--gold);background:var(--gold-bg)}

/* Costs */
.costs-toggle{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:white;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:var(--text)}
.costs-toggle:hover{border-color:var(--gold)}
.costs-panel{display:none;background:#f9f8f6;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px}
.costs-panel.open{display:block}
.costs-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.costs-row:last-child{border-bottom:none;font-weight:700;padding-top:10px;margin-top:4px;border-top:1.5px solid var(--border)}
.costs-row .label{color:var(--muted)}
.costs-row .value{font-family:var(--font-ui);font-weight:600}

/* Action buttons — 3 big touch targets */
.action-bar{display:flex;gap:8px;margin-top:16px}
.action-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:16px 8px;min-height:64px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all 0.2s;font-family:var(--font-ui)}
.action-btn:active{transform:scale(0.97)}
.action-btn .action-icon{font-size:22px}
.action-btn .action-label{font-size:11px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.04em}
.action-btn:hover{border-color:var(--gold);background:var(--gold-bg)}
.action-btn-visit{border-color:var(--success);background:rgba(44,95,46,0.04)}
.action-btn-visit:hover{background:rgba(44,95,46,0.1)}
.action-btn-visit .action-label{color:var(--success)}
.action-btn-discard{border-color:rgba(139,32,32,0.2)}
.action-btn-discard:hover{background:rgba(139,32,32,0.04)}
.action-btn-discard .action-label{color:var(--error)}

/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(35,35,32,0.6);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;padding:24px}
.modal h3{font-family:var(--font-ui);font-size:17px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--gold);color:#1C1C1C}
.btn-primary:hover{background:var(--gold-dark)}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-danger{background:var(--error);color:white}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* Calendar mini */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.cal-header{font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--muted);text-align:center;padding:4px}
.cal-day{padding:8px 4px;text-align:center;border-radius:8px;font-size:13px;font-family:var(--font-ui);cursor:pointer;border:none;background:transparent}
.cal-day:hover{background:var(--gold-bg)}
.cal-day.disabled{color:#ccc;cursor:default;pointer-events:none}
.cal-day.selected{background:var(--gold);color:#1C1C1C;font-weight:700}
.cal-day.today{border:1.5px solid var(--gold)}
.cal-month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-month-nav span{font-family:var(--font-ui);font-size:14px;font-weight:600}
.cal-month-nav button{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;color:var(--text)}
.time-slots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.time-slot{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);font-family:var(--font-ui);font-size:13px;cursor:pointer;background:white}
.time-slot:hover{border-color:var(--gold);background:var(--gold-bg)}
.time-slot.selected{border-color:var(--gold);background:var(--gold);color:#1C1C1C;font-weight:600}

/* Discard reasons */
.reason-opt{display:flex;align-items:center;gap:8px;padding:11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:6px;transition:border-color 0.15s}
.reason-opt:hover{border-color:var(--gold)}
.reason-opt.selected{border-color:var(--gold);background:var(--gold-bg)}
textarea{width:100%;font-family:inherit;font-size:13px;padding:10px;border:1.5px solid var(--border);border-radius:8px;resize:vertical}

/* States */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{text-align:center;padding:60px 20px}
.state-msg .state-icon{font-size:56px;margin-bottom:16px}
.state-msg h2{font-family:var(--font-ui);font-size:22px;font-weight:700;margin-bottom:8px}
.state-msg p{font-size:14px;color:var(--muted);line-height:1.6;max-width:380px;margin:0 auto}
.footer-brand{text-align:center;font-size:11px;color:var(--muted);padding:20px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#232320;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-family:var(--font-ui);z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* Completed piso badge */
.completed-badge{display:flex;align-items:center;gap:8px;padding:12px;border-radius:10px;font-family:var(--font-ui);font-size:13px;font-weight:600;margin-top:12px}
/* Toggle switch */
input[type="checkbox"]:checked + span { background: var(--gold) !important; }
input[type="checkbox"]:checked ~ span:last-child { left: 22px !important; }
.completed-badge.visit{background:rgba(44,95,46,0.08);color:var(--success)}
.completed-badge.discard{background:rgba(139,32,32,0.06);color:var(--error)}
.completed-badge.saved{background:rgba(201,168,76,0.1);color:var(--gold-dark)}
</style>

function toast(msg) { const el = document.getElementById('toast-el'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }

// ─── INIT ───
async function init() {
  const params = new URLSearchParams(location.search);
  const linkHash = params.get('id') || params.get('h');
  if (!linkHash) { showState('\u26A0\uFE0F', 'Link inv\u00E1lido', 'Este enlace no contiene informaci\u00F3n v\u00E1lida.'); return; }

  try {
    const { data: envios } = await sb.from('envios_matching').select('*').eq('link_hash', linkHash).limit(1);
    if (!envios || !envios.length) { showState('\u26A0\uFE0F', 'Enlace no v\u00E1lido', 'Este enlace no es v\u00E1lido o ha expirado.'); return; }
    _envio = envios[0];

    if (_envio.estado === 'respondido') {
      showState('\u2705', 'Ya has enviado tu valoraci\u00F3n', 'Gracias por tu respuesta. Tu asesor se pondr\u00E1 en contacto contigo pronto.');
      return;
    }

    // Mark opened
    if (!_envio.abierto_at) {
      await sb.from('envios_matching').update({ abierto_at: new Date().toISOString() }).eq('link_hash', linkHash);
    }

    // Load demanda
    const { data: dd } = await sb.from('demandas').select('*').eq('id', _envio.demanda_id).limit(1);
    if (dd && dd[0]) _demanda = dd[0];

    // Load matchings + pisos
    const matchIds = _envio.matchings_ids || [];
    if (!matchIds.length) { showState('\u26A0\uFE0F', 'Sin pisos', 'No hay pisos en este env\u00EDo.'); return; }
    const { data: matchings } = await sb.from('matchings').select('id,piso,score_matching,texto_recomendacion,tipo_operacion,estado').in('id', matchIds);

    const pisoIds = (matchings||[]).map(m => {
      const p = Array.isArray(m.piso) ? m.piso[0] : m.piso;
      return p ? String(p).replace(/[{}]/g, '') : null;
    }).filter(Boolean);
    const { data: pisosData, error: pisoErr } = await sb.from('pisos').select('id,direccion,barrio,precio,habitaciones,metros,planta,ascensor,terraza,garaje,trastero,estado_inmueble,fotos,descripcion_ia,urban_flip,video,planos,documentos,ite,catastro,memoria_calidades').in('id', pisoIds);
    if (pisoErr) console.error('[CLIENTE] Piso query error:', pisoErr);
    const pisosMap = {};
    (pisosData||[]).forEach(p => { pisosMap[p.id] = p; });
    console.log('[CLIENTE] Pisos loaded:', (pisosData||[]).length, 'IDs:', pisoIds);
    console.log('[CLIENTE] Sample piso:', pisosData?.[0]?.direccion, pisosData?.[0]?.precio);

    _pisos = (matchings||[]).map(m => {
      const pid = Array.isArray(m.piso) ? m.piso[0] : m.piso;
      const pisoId = pid ? String(pid).replace(/[{}]/g, '') : '';
      return { ...m, pisoData: pisosMap[pisoId] || {}, pisoId };
    }).sort((a, b) => (b.score_matching||0) - (a.score_matching||0));

    // Load previous feedbacks and visits for AI context
    try {
      const { data: fb } = await sb.from('feedbacks_cliente').select('*').eq('demanda_id', _envio.demanda_id);
      _allFeedbacks = fb || [];
    } catch(e) {}
    try {
      const demId = _envio.demanda_id;
      const { data: vis } = await sb.from('visitas').select('*');
      _allVisitas = (vis||[]).filter(v => {
        const refs = [v.demanda, v.demanda_2].flat().filter(Boolean).map(r => String(r).replace(/[{}]/g,''));
        return refs.includes(demId);
      });
    } catch(e) {}

    _currentIdx = 0;
    console.log('[CLIENTE] Ready to render', _pisos.length, 'pisos');
    console.log('[CLIENTE] First piso:', _pisos[0]?.pisoData?.direccion, _pisos[0]?.pisoData?.precio);
    renderCurrent();

    // Pre-generate AI texts for all pisos
    _pisos.forEach((m, i) => generateAIText(m, i));
  } catch(e) {
    console.error('[CLIENTE] Init error:', e);
    showState('\u26A0\uFE0F', 'Error', e.message + ' (l\u00EDnea: ' + (e.stack?.match(/:(\d+):/)?.[1] || '?') + ')');
  }
}

// ─── AI TEXT GENERATION ───
async function generateAIText(m, idx) {
  const p = m.pisoData;
  const prevActions = Object.entries(_actions).map(([mid, a]) => {
    const pm = _pisos.find(x => x.id === mid);
    return { piso: pm?.pisoData?.direccion, accion: a.action, motivo: a.reason || '' };
  });

  const prompt = `Eres un asesor inmobiliario de lujo de ONOMA Homes en Madrid. Genera un texto personalizado de 4-6 frases explicando por qu\u00E9 recomiendas este piso a este comprador. Usa tono cercano y profesional, en segunda persona ("Creemos que este piso es ideal para ti porque...").

PERFIL DEL COMPRADOR:
- Nombre: ${_envio.cliente_nombre || _demanda.nombre || 'Cliente'}
- Zona deseada: ${_demanda.zona_preferida || 'No especificada'}
- Presupuesto m\u00E1ximo: ${_demanda.presupuesto_max ? eur(_demanda.presupuesto_max) : 'No especificado'}
- Habitaciones m\u00EDnimas: ${_demanda.habitaciones_min || 'No especificado'}
- Notas del asesor: ${_demanda.notas_asesor || 'Sin notas'}
- Perfil - Qu\u00E9 valoran: ${_demanda.perfil_valoran || 'No especificado'}
- Perfil - Qu\u00E9 no quieren: ${_demanda.perfil_no_quieren || 'No especificado'}

PISO:
- Direcci\u00F3n: ${p.direccion || ''}, ${p.barrio || ''}
- Precio: ${eur(p.precio)}
- Habitaciones: ${p.habitaciones || '?'}, Metros: ${p.metros || '?'} m\u00B2
- Planta: ${p.planta || '?'}, Ascensor: ${p.ascensor ? 'S\u00ED' : 'No'}
- Terraza: ${p.terraza ? 'S\u00ED' : 'No'}, Garaje: ${p.garaje || p.parking ? 'S\u00ED' : 'No'}
- Estado: ${p.estado_inmueble || 'No especificado'}
- Score de compatibilidad: ${Math.round(m.score_matching||0)}%
${p.urban_flip ? '- EXCLUSIVO ONOMA (Urban Flip)' : ''}

${prevActions.length ? 'FEEDBACK ANTERIOR DEL CLIENTE EN OTROS PISOS:\n' + prevActions.map(a => '- ' + a.piso + ': ' + a.accion + (a.motivo ? ' (' + a.motivo + ')' : '')).join('\n') : ''}
${_allFeedbacks.length ? 'HISTORIAL DE FEEDBACKS:\n' + _allFeedbacks.map(f => '- Acci\u00F3n: ' + f.accion).join('\n') : ''}
${_allVisitas.length ? 'VISITAS ANTERIORES: ' + _allVisitas.length + ' visitas realizadas' : ''}

Responde SOLO con el texto de recomendaci\u00F3n, sin comillas ni encabezados.`;

  try {
    const resp = await fetch(N8N + '/generate-piso-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, pisoId: m.pisoId, demandaId: _envio.demanda_id })
    });
    if (resp.ok) {
      const data = await resp.json();
      // n8n returns array: [{text:'...'}]
      const item = Array.isArray(data) ? data[0] : data;
      _aiTexts[m.id] = item?.text || item?.output || item?.message || '';
    }
  } catch(e) {
    // Fallback to existing texto_recomendacion or descripcion_ia
    _aiTexts[m.id] = m.texto_recomendacion || p.descripcion_ia || '';
  }

  // If no AI text, use fallback
  if (!_aiTexts[m.id]) {
    _aiTexts[m.id] = m.texto_recomendacion || p.descripcion_ia || '';
  }

  // Re-render if this is the current piso
  if (idx === _currentIdx) {
    const aiEl = document.getElementById('ai-text-' + m.id);
    if (aiEl) aiEl.innerHTML = _aiTexts[m.id] || '<span style="color:var(--muted)">Informaci\u00F3n de compatibilidad no disponible para este piso.</span>';
    const skelEl = document.getElementById('ai-skeleton-' + m.id);
    if (skelEl) skelEl.style.display = 'none';
    const textEl = document.getElementById('ai-section-' + m.id);
    if (textEl) textEl.style.display = '';
  }
}

// ─── CAROUSEL ───
function cDir(mid, dir) {
  const c = document.getElementById('carousel-' + mid); if (!c) return;
  const imgs = c.querySelectorAll('img');
  const dots = c.querySelectorAll('.carousel-dot');
  const counter = c.querySelector('.carousel-counter');
  let cur = [...imgs].findIndex(i => i.classList.contains('active'));
  imgs[cur].classList.remove('active');
  if (dots[cur]) dots[cur].classList.remove('active');
  cur = (cur + dir + imgs.length) % imgs.length;
  imgs[cur].classList.add('active');
  if (dots[cur]) dots[cur].classList.add('active');
  if (counter) counter.textContent = (cur + 1) + ' / ' + imgs.length;
}
function cSlide(mid, idx) {
  const c = document.getElementById('carousel-' + mid); if (!c) return;
  c.querySelectorAll('img').forEach((img, i) => img.classList.toggle('active', i === idx));
  c.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  const counter = c.querySelector('.carousel-counter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + c.querySelectorAll('img').length;
}

// ─── LIGHTBOX ───
function openLightbox(pisoIdx) {
  const p = _pisos[pisoIdx]?.pisoData;
  let fotos = p?.fotos || [];
  if (typeof fotos === 'string') { try { fotos = JSON.parse(fotos); } catch(e) { fotos = []; } }
  if (!Array.isArray(fotos)) fotos = [];
  _lbPhotos = fotos.map(f => typeof f === 'object' ? (f.url || '') : String(f)).filter(u => u.startsWith('http'));
  if (!_lbPhotos.length) return;
  _lbIdx = 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lbNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbPhotos.length) % _lbPhotos.length;
  updateLightbox();
}
function updateLightbox() {
  document.getElementById('lb-img').src = _lbPhotos[_lbIdx];
  document.getElementById('lb-dots').innerHTML = _lbPhotos.map((_, i) =>
    `<button class="lightbox-dot ${i === _lbIdx ? 'active' : ''}" onclick="event.stopPropagation();_lbIdx=${i};updateLightbox()"></button>`
  ).join('');
}

// ─── VISIT MODAL (mini calendar) ───
let _visitMonthOffset = 0, _visitSelectedDate = null, _visitSelectedTime = null, _visitMatchId = null;

function openVisitModal(matchId) {
  _visitMatchId = matchId;
  _visitMonthOffset = 0;
  _visitSelectedDate = null;
  _visitSelectedTime = null;
  renderVisitModal();
  document.getElementById('visit-modal').classList.add('open');
}

function renderVisitModal() {
  const now = new Date();
  const viewMonth = new Date(now.getFullYear(), now.getMonth() + _visitMonthOffset, 1);
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['L','M','X','J','V','S','D'];

  const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = now.toISOString().split('T')[0];

  let calCells = dayNames.map(d => `<div class="cal-header">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) calCells += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = dateStr < todayStr;
    const isToday = dateStr === todayStr;
    const isSel = dateStr === _visitSelectedDate;
    calCells += `<button class="cal-day ${isPast?'disabled':''} ${isToday?'today':''} ${isSel?'selected':''}" ${isPast?'disabled':''} onclick="selectVisitDate('${dateStr}')">${d}</button>`;
  }

  const times = ['09:00','10:00','11:00','12:00','13:00','16:00','17:00','18:00','19:00'];

  document.getElementById('visit-modal-content').innerHTML = `
    <h3>\u2705 Elegir d\u00EDa y hora de visita</h3>
    <div class="cal-month-nav">
      <button onclick="_visitMonthOffset--;renderVisitModal()" ${_visitMonthOffset<=0?'disabled style="opacity:0.3"':''}>\u2039</button>
      <span>${monthNames[month]} ${year}</span>
      <button onclick="_visitMonthOffset++;renderVisitModal()">\u203A</button>
    </div>
    <div class="cal-grid">${calCells}</div>
    ${_visitSelectedDate ? `
      <div style="font-family:var(--font-ui);font-size:13px;font-weight:600;margin-bottom:8px">Hora preferida:</div>
      <div class="time-slots">${times.map(t => `<button class="time-slot ${_visitSelectedTime===t?'selected':''}" onclick="selectVisitTime('${t}')">${t}</button>`).join('')}</div>
    ` : '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Selecciona un d\u00EDa en el calendario</p>'}
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('visit-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmVisit()" ${_visitSelectedDate && _visitSelectedTime ? '' : 'disabled'}>Confirmar visita</button>
    </div>
  `;
}

function selectVisitDate(dateStr) { _visitSelectedDate = dateStr; renderVisitModal(); }
function selectVisitTime(time) { _visitSelectedTime = time; renderVisitModal(); }

async function confirmVisit() {
  const m = _pisos.find(p => p.id === _visitMatchId);
  if (!m) return;

  _actions[_visitMatchId] = { action: 'visitar', date: _visitSelectedDate, time: _visitSelectedTime };

  // Save to Supabase
  try {
    await sb.from('feedbacks_cliente').upsert({
      envio_id: _envio.id,
      matching_id: _visitMatchId,
      piso_id: m.pisoId,
      demanda_id: _envio.demanda_id,
      accion: 'visitar',
      origen: 'cliente_final',
      created_at: new Date().toISOString()
    }, { onConflict: 'envio_id,matching_id' });

    // Create accion for asesor
    const p = m.pisoData;
    await sb.from('acciones_pendientes').insert({
      asesor_id: _envio.asesor_id,
      tipo: 'programar_visita',
      titulo: '\u2705 Cliente quiere VISITAR \u2014 ' + (p.direccion || 'piso'),
      descripcion: (_envio.cliente_nombre || _demanda.nombre || 'Cliente') + ' quiere visitar ' + (p.direccion || '') + ' (' + (p.barrio || '') + ') el ' + _visitSelectedDate + ' a las ' + _visitSelectedTime,
      referencia_id: _envio.demanda_id,
      piso_id: m.pisoId,
      estado: 'pendiente',
      prioridad: 'alta'
    });
  } catch(e) { console.warn('Save visit:', e); }

  closeModal('visit-modal');
  toast('\u2705 Visita solicitada');
  renderCurrent();
  setTimeout(goNext, 1200);
}

// ─── DISCARD MODAL ───
let _discardMatchId = null, _discardReason = '';

function openDiscardModal(matchId) {
  _discardMatchId = matchId;
  _discardReason = '';
  const reasons = ['Precio alto', 'Zona no me convence', 'Tama\u00F1o insuficiente', 'Estado del piso', 'Otro'];
  document.getElementById('discard-modal-content').innerHTML = `
    <h3>\uD83D\uDDD1\uFE0F \u00BFPor qu\u00E9 descartas este piso?</h3>
    <div id="discard-reasons">${reasons.map(r => `<div class="reason-opt" onclick="selectDiscardReason(this,'${r}')">${r}</div>`).join('')}</div>
    <textarea id="discard-notes" rows="2" placeholder="Notas adicionales (opcional)..." style="margin-top:8px"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('discard-modal')">Cancelar</button>
      <button class="btn btn-danger" id="btn-confirm-discard" onclick="confirmDiscard()" disabled>Confirmar descarte</button>
    </div>
  `;
  document.getElementById('discard-modal').classList.add('open');
}

function selectDiscardReason(el, reason) {
  document.querySelectorAll('#discard-reasons .reason-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  _discardReason = reason;
  document.getElementById('btn-confirm-discard').disabled = false;
}

async function confirmDiscard() {
  const notes = document.getElementById('discard-notes').value.trim();
  const fullReason = _discardReason + (notes ? ': ' + notes : '');
  const m = _pisos.find(p => p.id === _discardMatchId);
  if (!m) return;

  _actions[_discardMatchId] = { action: 'descartar', reason: fullReason };

  try {
    await sb.from('feedbacks_cliente').upsert({
      envio_id: _envio.id,
      matching_id: _discardMatchId,
      piso_id: m.pisoId,
      demanda_id: _envio.demanda_id,
      accion: 'descartar',
      origen: 'cliente_final',
      created_at: new Date().toISOString()
    }, { onConflict: 'envio_id,matching_id' });

    await sb.from('matchings').update({ estado: 'descartado_cliente', feedback_descarte_asesor: fullReason }).eq('id', _discardMatchId);
  } catch(e) { console.warn('Save discard:', e); }

  closeModal('discard-modal');
  toast('\uD83D\uDDD1\uFE0F Piso descartado');
  renderCurrent();
  setTimeout(goNext, 1200);
}

// ─── GUARDAR ───
async function doGuardar(matchId) {
  const m = _pisos.find(p => p.id === matchId);
  if (!m) return;

  _actions[matchId] = { action: 'guardar' };

  try {
    await sb.from('feedbacks_cliente').upsert({
      envio_id: _envio.id,
      matching_id: matchId,
      piso_id: m.pisoId,
      demanda_id: _envio.demanda_id,
      accion: 'guardar',
      origen: 'cliente_final',
      created_at: new Date().toISOString()
    }, { onConflict: 'envio_id,matching_id' });
  } catch(e) { console.warn('Save guardar:', e); }

  toast('\uD83D\uDCBE Guardado');
  renderCurrent();
  setTimeout(goNext, 800);
}

// ─── FINALIZE ───
async function finalize() {
  try {
    await sb.from('envios_matching').update({
      estado: 'respondido',
      feedback_descarte: _actions,
      fecha_accion: new Date().toISOString()
    }).eq('link_hash', _envio.link_hash);
  } catch(e) { console.warn('Finalize:', e); }

  showState('\uD83C\uDF89', '\u00A1Gracias por tu valoraci\u00F3n!', 'Tu asesor se pondr\u00E1 en contacto contigo pronto para organizar las visitas y los pr\u00F3ximos pasos.');
}

// ─── UTILS ───
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showState(icon, title, msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="state-msg"><div class="state-icon">${icon}</div><h2>${title}</h2><p>${msg}</p></div>
    <div class="footer-brand">ONOMA Homes \u00B7 onoma.es</div>`;
}

// Costs toggle + recalc
function toggleCosts(mid) {
  const panel = document.getElementById('costs-' + mid);
  const arrow = document.getElementById('costs-arrow-' + mid);
  panel.classList.toggle('open');
  arrow.textContent = panel.classList.contains('open') ? '\u25B2' : '\u25BC';
}
function recalcCosts(mid, precio) {
  const vh = document.getElementById('vh-' + mid).checked;
  const rate = vh ? 0.054 : 0.06;
  const itp = Math.round(precio * rate);
  const notaria = Math.round(precio * 0.003 + 300);
  const registro = Math.round(precio * 0.002 + 200);
  const gestoria = 800;
  const honorarios = Math.round(precio * 0.03);
  const total = precio + itp + notaria + registro + gestoria + honorarios;
  document.getElementById('itp-label-' + mid).textContent = 'ITP (' + (vh ? '5,4%' : '6%') + ')';
  document.getElementById('itp-val-' + mid).textContent = eur(itp);
  document.getElementById('total-val-' + mid).textContent = eur(total);
}

// Keyboard nav for lightbox
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

init();
</script>
